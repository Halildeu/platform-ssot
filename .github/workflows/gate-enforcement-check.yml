name: gate-enforcement-check
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  enforcement-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; enforcement baseline mode ile devam."
          fi
          pip install semgrep==1.146.0

      - name: Standards lock + ownership baseline
        run: |
          python3 ci/check_standards_lock.py

      - name: Script budget guard
        run: |
          python3 ci/check_script_budget.py --out .cache/script_budget/report.json

      - name: Module delivery lanes contract
        run: |
          python3 ci/check_module_delivery_lanes.py --strict

      - name: Feature execution bridge gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-PM-SUITE/contract/check_feature_execution_contract.py \
              --repo-root . \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/feature_execution_contract_ci.v1.json
          else
            python3 extensions/PRJ-PM-SUITE/contract/check_feature_execution_contract.py \
              --repo-root . \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/feature_execution_contract_ci.v1.json
          fi

      - name: Delivery session packet build
        run: |
          python3 extensions/PRJ-PM-SUITE/contract/build_delivery_session_packet.py \
            --repo-root . \
            --out .cache/reports/delivery_session_packet_ci.v1.json

      - name: Delivery session guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-PM-SUITE/contract/check_delivery_session_guard.py \
              --repo-root . \
              --packet .cache/reports/delivery_session_packet_ci.v1.json \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/delivery_session_guard_ci.v1.json
          else
            python3 extensions/PRJ-PM-SUITE/contract/check_delivery_session_guard.py \
              --repo-root . \
              --packet .cache/reports/delivery_session_packet_ci.v1.json \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/delivery_session_guard_ci.v1.json
          fi

      - name: UX catalog gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-UX-NORTH-STAR/contract/check_ux_catalog_enforcement.py \
              --repo-root . \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/ux_catalog_enforcement_ci.v1.json
          else
            python3 extensions/PRJ-UX-NORTH-STAR/contract/check_ux_catalog_enforcement.py \
              --repo-root . \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/ux_catalog_enforcement_ci.v1.json
          fi

      - name: Solo branch policy guard (advisory)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/check_branch_protection_solo_policy.py \
            --repo-slug "${{ github.repository }}" \
            --mode warn \
            --out .cache/reports/branch_protection_solo_policy_ci.v1.json

      - name: Detect enforcement runtime
        id: detect-enforcement-runtime
        run: |
          if [ -f src/ops/manage.py ]; then
            echo "has_runtime=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_runtime=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve PR baseline (merge-base)
        if: github.event_name == 'pull_request' && steps.detect-enforcement-runtime.outputs.has_runtime == 'true'
        run: |
          set -euo pipefail
          BASE_PARENT="$(git rev-parse HEAD^1)"
          PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
          MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
          echo "ENF_PR_HEAD=${PR_HEAD_PARENT}" >> "${GITHUB_ENV}"
          echo "ENF_BASELINE=git:${MERGE_BASE}" >> "${GITHUB_ENV}"

      - name: Enforcement check (PR strict)
        if: github.event_name == 'pull_request' && steps.detect-enforcement-runtime.outputs.has_runtime == 'true'
        run: |
          set -euo pipefail
          git checkout "${ENF_PR_HEAD}"
          python3 -m src.ops.manage enforcement-check --profile strict --baseline "${ENF_BASELINE}" --outdir .cache/ws_customer_default/.cache/reports/enf_ci

      - name: Enforcement check (main strict)
        if: github.event_name != 'pull_request' && steps.detect-enforcement-runtime.outputs.has_runtime == 'true'
        run: |
          python3 -m src.ops.manage enforcement-check --profile strict --baseline git:HEAD~1 --outdir .cache/ws_customer_default/.cache/reports/enf_ci

      - name: Enforcement fallback (portable baseline)
        if: steps.detect-enforcement-runtime.outputs.has_runtime != 'true'
        run: |
          echo "src/ops/manage.py bulunamadi; portable enforcement baseline ile devam."
          python3 ci/check_standards_lock.py
          python3 ci/check_module_delivery_lanes.py --strict

      - name: Upload enforcement evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enforcement-check-evidence
          path: |
            .cache/ws_customer_default/.cache/reports/enf_ci
            .cache/script_budget/report.json
            .cache/reports/branch_protection_solo_policy_ci.v1.json
            .cache/reports/feature_execution_contract_ci.v1.json
            .cache/reports/delivery_session_packet_ci.v1.json
            .cache/reports/delivery_session_guard_ci.v1.json
            .cache/reports/ux_catalog_enforcement_ci.v1.json
          if-no-files-found: warn
