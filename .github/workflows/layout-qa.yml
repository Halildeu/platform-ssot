name: Layout QA

on:
  pull_request:
    paths:
      - "backend/**"
      - "web/**"
      - "docs/00-handbook/**"
      - "scripts/**"
      - ".github/workflows/layout-qa.yml"
  workflow_dispatch: {}

jobs:
  layout-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run layout scripts
        run: |
          set -e
          python3 scripts/check_backend_service_layout.py
          python3 scripts/check_web_mfe_layout.py
