name: PR Merge Bot

on:
  workflow_run:
    workflows: ["ci-gate", "Doc QA", "Layout QA", "Web QA", "security-guardrails"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: read

concurrency:
  group: pr-merge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Merge ready PR (label-gated)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          python3 scripts/pr_merge.py --rules-path docs/04-operations/PR-BOT-RULES.json
