name: PR Merge Bot

on:
  workflow_run:
    workflows: ["ci-gate", "Doc QA", "Layout QA", "Web QA", "security-guardrails"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: string
      confirm:
        description: "Type MERGE to confirm"
        required: true
        default: "NO"
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write

concurrency:
  group: pr-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'pull_request'
        && github.event.workflow_run.head_repository.fork == false
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirm workflow_dispatch (break-glass)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "MERGE" ]; then
            echo "::error title=pr-merge::confirm must be MERGE"
            exit 1
          fi
          if ! [[ "${{ inputs.pr_number }}" =~ ^[0-9]+$ ]]; then
            echo "::error title=pr-merge::pr_number must be numeric"
            exit 1
          fi

      - name: Merge ready PR (label-gated)
        id: pr-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 scripts/pr_merge.py --rules-path docs-ssot/04-operations/PR-BOT-RULES.json --pr "${{ inputs.pr_number }}" | tee artifacts/pr-merge.log
          else
            python3 scripts/pr_merge.py --rules-path docs-ssot/04-operations/PR-BOT-RULES.json | tee artifacts/pr-merge.log
          fi

      - name: Upsert PR comment (merge result)
        if: always()
        uses: actions/github-script@v7
        env:
          MARKER: <!-- pr-merge:result -->
          REPORT_PATH: artifacts/pr-merge.log
          RESULT_PREFIX: "[pr-merge] RESULT "
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            const marker = process.env.MARKER || '<!-- pr-merge:result -->';
            const reportPath = process.env.REPORT_PATH || '';
            const prefix = process.env.RESULT_PREFIX || '[pr-merge] RESULT ';

            let report = '';
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              report = '';
            }

            const lines = report.split(/\r?\n/);
            const resultLine = lines.find((l) => l.startsWith(prefix));
            let resultJson = null;
            if (resultLine) {
              try {
                resultJson = JSON.parse(resultLine.slice(prefix.length));
              } catch (e) {
                resultJson = null;
              }
            }

            const run = context.payload.workflow_run || {};
            const runUrl = run.html_url || '';
            const sha = run.head_sha || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const hasExplicitNullPr =
              resultJson && Object.prototype.hasOwnProperty.call(resultJson, 'pr') && resultJson.pr === null;
            if (hasExplicitNullPr) {
              core.notice('PR Merge Bot: no target PR (result pr=null); skipping PR comment.');
              return;
            }

            let prNumber = resultJson && Number.isInteger(resultJson.pr) ? resultJson.pr : null;
            if (!prNumber && Array.isArray(run.pull_requests) && run.pull_requests.length > 0) {
              prNumber = run.pull_requests[0].number;
            }

            if (!prNumber && sha) {
              try {
                const resp = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
                  owner,
                  repo,
                  commit_sha: sha,
                  headers: { accept: 'application/vnd.github+json, application/vnd.github.groot-preview+json' },
                });

                const prs = Array.isArray(resp.data) ? resp.data : [];
                const open = prs.find((p) => p && p.state === 'open');
                if (open && Number.isInteger(open.number)) {
                  prNumber = open.number;
                }
              } catch (e) {
                core.notice(`PR lookup via commit->pulls failed: ${e.message}`);
              }
            }

            if (!prNumber) {
              core.notice('No PR found for this workflow_run; skipping comment.');
              return;
            }

            const resultText = resultJson && typeof resultJson.result === 'string' ? resultJson.result : 'unknown';
            const reasonText =
              resultJson && typeof resultJson.reason === 'string' ? resultJson.reason.trim() : '';

            const bodyLines = [];
            bodyLines.push(marker);
            bodyLines.push(`Result: ${resultText}`);
            if (reasonText) {
              bodyLines.push(`Reason: ${reasonText}`);
            }
            if (runUrl) {
              bodyLines.push(`Run: ${runUrl}`);
            }
            bodyLines.push(`PR: #${prNumber}`);
            if (sha) {
              bodyLines.push(`Head: ${String(sha).slice(0, 7)}`);
            }

            if (resultLine) {
              bodyLines.push('');
              bodyLines.push('```json');
              bodyLines.push(resultLine.slice(prefix.length));
              bodyLines.push('```');
            } else {
              const tail = lines.slice(-120).join('\n').trim();
              if (tail) {
                bodyLines.push('');
                bodyLines.push('```');
                bodyLines.push(tail.slice(0, 8000));
                bodyLines.push('```');
              }
            }

            const desiredBody = bodyLines.join('\n');

            const comments = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));

            if (existing) {
              if (existing.body === desiredBody) {
                core.notice(`Comment up-to-date (id=${existing.id}).`);
                return;
              }
              await github.request('PATCH /repos/{owner}/{repo}/issues/comments/{comment_id}', {
                owner,
                repo,
                comment_id: existing.id,
                body: desiredBody,
              });
              core.notice(`Updated comment (id=${existing.id}).`);
              return;
            }

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner,
              repo,
              issue_number: prNumber,
              body: desiredBody,
            });
            core.notice('Created comment.');
