name: PR Merge Bot

on:
  workflow_run:
    workflows: ["ci-gate", "Doc QA", "Layout QA", "Web QA", "security-guardrails"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write

concurrency:
  group: pr-merge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Merge ready PR (label-gated)
        id: pr-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 scripts/pr_merge.py --rules-path docs/04-operations/PR-BOT-RULES.json | tee artifacts/pr-merge.log

      - name: Upsert PR comment (merge result)
        if: always()
        uses: actions/github-script@v7
        env:
          MARKER: <!-- pr-merge:result -->
          REPORT_PATH: artifacts/pr-merge.log
          RESULT_PREFIX: "[pr-merge] RESULT "
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            const marker = process.env.MARKER || '<!-- pr-merge:result -->';
            const reportPath = process.env.REPORT_PATH || '';
            const prefix = process.env.RESULT_PREFIX || '[pr-merge] RESULT ';

            let report = '';
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              report = '';
            }

            const lines = report.split(/\r?\n/);
            const resultLine = lines.find((l) => l.startsWith(prefix));
            let resultJson = null;
            if (resultLine) {
              try {
                resultJson = JSON.parse(resultLine.slice(prefix.length));
              } catch (e) {
                resultJson = null;
              }
            }

            const run = context.payload.workflow_run || {};
            const runUrl = run.html_url || '';
            const sha = run.head_sha || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let prNumber = resultJson && Number.isInteger(resultJson.pr) ? resultJson.pr : null;
            if (!prNumber && Array.isArray(run.pull_requests) && run.pull_requests.length > 0) {
              prNumber = run.pull_requests[0].number;
            }

            if (!prNumber && sha) {
              try {
                const resp = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
                  owner,
                  repo,
                  commit_sha: sha,
                  headers: { accept: 'application/vnd.github+json, application/vnd.github.groot-preview+json' },
                });

                const prs = Array.isArray(resp.data) ? resp.data : [];
                const open = prs.find((p) => p && p.state === 'open');
                const picked = open || prs[0];
                if (picked && Number.isInteger(picked.number)) {
                  prNumber = picked.number;
                }
              } catch (e) {
                core.notice(`PR lookup via commit->pulls failed: ${e.message}`);
              }
            }

            if (!prNumber) {
              core.notice('No PR found for this workflow_run; skipping comment.');
              return;
            }

            let resultText = 'unknown';
            if (resultJson && typeof resultJson.result === 'string') {
              resultText = resultJson.result;
              if (typeof resultJson.reason === 'string' && resultJson.reason.trim()) {
                resultText += ` (${resultJson.reason.trim()})`;
              }
            }

            const bodyLines = [];
            bodyLines.push(marker);
            bodyLines.push(`Result: ${resultText}`);
            if (runUrl) {
              bodyLines.push(`Run: ${runUrl}`);
            }

            if (resultLine) {
              bodyLines.push('');
              bodyLines.push('```json');
              bodyLines.push(resultLine.slice(prefix.length));
              bodyLines.push('```');
            } else {
              const tail = lines.slice(-120).join('\n').trim();
              if (tail) {
                bodyLines.push('');
                bodyLines.push('```');
                bodyLines.push(tail.slice(0, 8000));
                bodyLines.push('```');
              }
            }

            const desiredBody = bodyLines.join('\n');

            const comments = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));

            if (existing) {
              if (existing.body === desiredBody) {
                core.notice(`Comment up-to-date (id=${existing.id}).`);
                return;
              }
              await github.request('PATCH /repos/{owner}/{repo}/issues/comments/{comment_id}', {
                owner,
                repo,
                comment_id: existing.id,
                body: desiredBody,
              });
              core.notice(`Updated comment (id=${existing.id}).`);
              return;
            }

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner,
              repo,
              issue_number: prNumber,
              body: desiredBody,
            });
            core.notice('Created comment.');
