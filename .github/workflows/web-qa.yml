name: Web QA

on:
  pull_request:
    paths:
      - "web/**"
      - "scripts/**"
      - ".github/workflows/web-qa.yml"
  workflow_dispatch: {}

jobs:
  web-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Version gates (toolchain/lockfile/ag-grid)
        run: python3 scripts/check_version_gates.py --mode ci

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Theme guardrails (contract + no-fallback)
        run: |
          pnpm -C web run tokens:build -- --check
          python3 scripts/check_theme_contract_consistency.py
          python3 scripts/check_tailwind_token_map.py
          python3 scripts/check_theme_override_allowlist.py
          python3 scripts/check_no_hardcoded_theme_styles.py

      - name: Web lint
        run: bash scripts/run_lint_web.sh

      - name: Web unit tests
        run: bash scripts/run_tests_web.sh unit
