name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Deployment environment (informational)"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    environment: ${{ github.event.inputs.env || 'stage' }}
    env:
      DEPLOY_ENABLED: ${{ secrets.DEPLOY_ENABLED }}
      WEB_DEPLOY_PROVIDER: ${{ vars.WEB_DEPLOY_PROVIDER || 'hook' }}

    steps:
      - name: Skip if deploy disabled
        if: ${{ env.DEPLOY_ENABLED != 'true' }}
        run: echo "::notice title=deploy-web::DEPLOY_ENABLED!=true; skipping."

      - uses: actions/checkout@v6
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          python-version: "3.11"

      - name: Deploy gate (technical baseline + release contract)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          DEPLOY_SCOPE: ${{ github.event.inputs.env || 'stage' }}
          AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM: ${{ secrets.AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          scope="${DEPLOY_SCOPE}"
          echo "::notice title=deploy-web::deploy_gate scope=${scope}"

          key_path=""
          if [ "${scope}" = "prod" ]; then
            if [ -z "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM:-}" ]; then
              echo "::error title=deploy-web::AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM missing; refusing prod deploy."
              exit 1
            fi
            key_path="${RUNNER_TEMP}/autonomous_pipeline_signing_public.pem"
            printf "%s" "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM}" > "${key_path}"
            chmod 600 "${key_path}"
          fi

          if [ -n "${key_path}" ]; then
            python3 scripts/ops/deploy_scope_gate.py \
              --target web \
              --scope "${scope}" \
              --public-key "${key_path}" \
              --out .cache/reports/deploy_scope_gate_web.v1.json
          else
            python3 scripts/ops/deploy_scope_gate.py \
              --target web \
              --scope "${scope}" \
              --out .cache/reports/deploy_scope_gate_web.v1.json
          fi

      - uses: actions/setup-node@v6
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Enable corepack
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        run: corepack enable

      - name: Install web dependencies
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build web
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER != 'cloudflare' }}
        run: pnpm run build
        working-directory: web

      - name: Validate deploy config (required)
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'hook' }}
        env:
          WEB_DEPLOY_HOOK_URL: ${{ secrets.WEB_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${WEB_DEPLOY_HOOK_URL:-}" ]; then
            echo "::error title=deploy-web::WEB_DEPLOY_HOOK_URL missing; refusing to deploy."
            exit 1
          fi

      - name: Validate Cloudflare config (required)
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'cloudflare' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}
          CLOUDFLARE_ROUTE_PATTERN: ${{ vars.CLOUDFLARE_ROUTE_PATTERN }}
          CLOUDFLARE_PUBLIC_ORIGIN: ${{ vars.CLOUDFLARE_PUBLIC_ORIGIN }}
          CLOUDFLARE_BACKEND_ORIGIN: ${{ vars.CLOUDFLARE_BACKEND_ORIGIN }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_WORKER_NAME
            CLOUDFLARE_ZONE_NAME
            CLOUDFLARE_ROUTE_PATTERN
            CLOUDFLARE_PUBLIC_ORIGIN
            CLOUDFLARE_BACKEND_ORIGIN
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error title=deploy-web::${key} missing; refusing Cloudflare deploy."
              exit 1
            fi
          done

          case "${CLOUDFLARE_BACKEND_ORIGIN}" in
            http://10.*|https://10.*|http://192.168.*|https://192.168.*|http://172.1[6-9].*|https://172.1[6-9].*|http://172.2[0-9].*|https://172.2[0-9].*|http://172.3[0-1].*|https://172.3[0-1].*)
              echo "::error title=deploy-web::CLOUDFLARE_BACKEND_ORIGIN points to a private network origin; Cloudflare edge cannot reach it directly."
              exit 1
              ;;
          esac

      - name: Build Cloudflare single-domain bundle
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'cloudflare' }}
        env:
          CLOUDFLARE_PUBLIC_ORIGIN: ${{ vars.CLOUDFLARE_PUBLIC_ORIGIN }}
        run: pnpm run build:cloudflare:single-domain
        working-directory: web

      - name: Render wrangler config
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'cloudflare' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}
          CLOUDFLARE_ROUTE_PATTERN: ${{ vars.CLOUDFLARE_ROUTE_PATTERN }}
          CLOUDFLARE_PUBLIC_ORIGIN: ${{ vars.CLOUDFLARE_PUBLIC_ORIGIN }}
          CLOUDFLARE_BACKEND_ORIGIN: ${{ vars.CLOUDFLARE_BACKEND_ORIGIN }}
          CLOUDFLARE_COMPATIBILITY_DATE: ${{ vars.CLOUDFLARE_COMPATIBILITY_DATE }}
        run: pnpm run cloudflare:render-config
        working-directory: web

      - name: Deploy web (hook)
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'hook' }}
        env:
          WEB_DEPLOY_HOOK_URL: ${{ secrets.WEB_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice title=deploy-web::Triggering deploy hook (URL hidden)."
          curl -fsS -X POST "${WEB_DEPLOY_HOOK_URL}"

      - name: Deploy web (Cloudflare)
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'cloudflare' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          set +x
          echo "::notice title=deploy-web::Deploying single-domain bundle to Cloudflare."
          pnpm dlx wrangler@4 deploy --config deploy/cloudflare/wrangler.ai-acik-com.generated.jsonc
        working-directory: web

      - name: Validate web smoke inline
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.WEB_DEPLOY_PROVIDER == 'cloudflare' }}
        env:
          WEB_SMOKE_URL: ${{ secrets.WEB_SMOKE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${WEB_SMOKE_URL:-}" ]; then
            echo "::notice title=deploy-web::WEB_SMOKE_URL missing; skipping inline smoke."
            exit 0
          fi
          curl -fsS "${WEB_SMOKE_URL}" >/dev/null
