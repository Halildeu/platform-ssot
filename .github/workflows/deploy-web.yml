name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Deployment environment (informational)"
        required: true
        default: "stage"

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      DEPLOY_ENABLED: ${{ secrets.DEPLOY_ENABLED }}

    steps:
      - name: Skip if deploy disabled
        if: ${{ env.DEPLOY_ENABLED != 'true' }}
        run: echo "::notice title=deploy-web::DEPLOY_ENABLED!=true; skipping."

      - uses: actions/checkout@v6
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          python-version: "3.11"

      - name: Deploy gate (technical baseline + release contract)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          DEPLOY_SCOPE: ${{ github.event.inputs.env || 'stage' }}
          AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM: ${{ secrets.AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          scope="${DEPLOY_SCOPE}"
          echo "::notice title=deploy-web::deploy_gate scope=${scope}"

          key_path=""
          if [ "${scope}" = "prod" ]; then
            if [ -z "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM:-}" ]; then
              echo "::error title=deploy-web::AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM missing; refusing prod deploy."
              exit 1
            fi
            key_path="${RUNNER_TEMP}/autonomous_pipeline_signing_public.pem"
            printf "%s" "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM}" > "${key_path}"
            chmod 600 "${key_path}"
          fi

          if [ -n "${key_path}" ]; then
            python3 scripts/ops/deploy_scope_gate.py \
              --target web \
              --scope "${scope}" \
              --public-key "${key_path}" \
              --out .cache/reports/deploy_scope_gate_web.v1.json
          else
            python3 scripts/ops/deploy_scope_gate.py \
              --target web \
              --scope "${scope}" \
              --out .cache/reports/deploy_scope_gate_web.v1.json
          fi

      - uses: actions/setup-node@v6
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        run: npm ci
        working-directory: web

      - name: Build web
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        run: npm run build
        working-directory: web

      - name: Validate deploy config (required)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          WEB_DEPLOY_HOOK_URL: ${{ secrets.WEB_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${WEB_DEPLOY_HOOK_URL:-}" ]; then
            echo "::error title=deploy-web::WEB_DEPLOY_HOOK_URL missing; refusing to deploy."
            exit 1
          fi

      - name: Deploy web (hook)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          WEB_DEPLOY_HOOK_URL: ${{ secrets.WEB_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice title=deploy-web::Triggering deploy hook (URL hidden)."
          curl -fsS -X POST "${WEB_DEPLOY_HOOK_URL}"
