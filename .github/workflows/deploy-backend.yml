name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/ubuntu/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Deployment environment (informational)"
        required: true
        default: "stage"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    environment: ${{ github.event.inputs.env || 'stage' }}
    env:
      DEPLOY_ENABLED: ${{ secrets.DEPLOY_ENABLED }}
      BACKEND_SSH_DEPLOY_ENABLED: ${{ secrets.BACKEND_SSH_DEPLOY_ENABLED }}

    steps:
      - name: Skip if deploy disabled
        if: ${{ env.DEPLOY_ENABLED != 'true' }}
        run: echo "::notice title=deploy-backend::DEPLOY_ENABLED!=true; skipping."

      - uses: actions/checkout@v4
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          python-version: "3.11"

      - name: Deploy gate (technical baseline + release contract)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          DEPLOY_SCOPE: ${{ github.event.inputs.env || 'stage' }}
          AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM: ${{ secrets.AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          scope="${DEPLOY_SCOPE}"
          echo "::notice title=deploy-backend::deploy_gate scope=${scope}"

          key_path=""
          if [ "${scope}" = "prod" ]; then
            if [ -z "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM:-}" ]; then
              echo "::error title=deploy-backend::AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM missing; refusing prod deploy."
              exit 1
            fi
            key_path="${RUNNER_TEMP}/autonomous_pipeline_signing_public.pem"
            printf "%s" "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM}" > "${key_path}"
            chmod 600 "${key_path}"
          fi

          if [ -n "${key_path}" ]; then
            python3 scripts/ops/deploy_scope_gate.py \
              --target backend \
              --scope "${scope}" \
              --public-key "${key_path}" \
              --out .cache/reports/deploy_scope_gate_backend.v1.json
          else
            python3 scripts/ops/deploy_scope_gate.py \
              --target backend \
              --scope "${scope}" \
              --out .cache/reports/deploy_scope_gate_backend.v1.json
          fi

      - name: Build & push images (required)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          echo "::add-mask::${GH_TOKEN}"
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

          echo "::group::docker compose build (backend/docker-compose.yml)"
          docker compose -f backend/docker-compose.yml build
          echo "::endgroup::"

          short_sha="${SHA:0:7}"
          stable_tag=""
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            stable_tag="main-stable"
          fi

          echo "::group::tag + push (serban-* -> ghcr.io/${GHCR_OWNER}/...)"
          images="$(docker image ls --format '{{.Repository}}:{{.Tag}}' | grep -E '^serban-' || true)"
          if [ -z "${images}" ]; then
            echo "::error title=deploy-backend::No serban-* images found; failing deploy-backend."
            exit 1
          fi

          while IFS= read -r img; do
            name="${img%%:*}"
            svc="${name#serban-}"
            target="ghcr.io/${GHCR_OWNER}/platform-ssot-${svc}"

            docker tag "${img}" "${target}:sha-${short_sha}"
            docker push "${target}:sha-${short_sha}"
            if [ -n "${stable_tag}" ]; then
              docker tag "${img}" "${target}:${stable_tag}"
              docker push "${target}:${stable_tag}"
            fi
          done <<< "${images}"
          echo "::endgroup::"

      - name: Deploy to Ubuntu via SSH (required)
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.BACKEND_SSH_DEPLOY_ENABLED == 'true' }}
        env:
          SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
          BACKEND_DEPLOY_SSH_HOST: ${{ secrets.BACKEND_DEPLOY_SSH_HOST }}
          BACKEND_DEPLOY_SSH_PORT: ${{ secrets.BACKEND_DEPLOY_SSH_PORT }}
          BACKEND_DEPLOY_SSH_USER: ${{ secrets.BACKEND_DEPLOY_SSH_USER }}
          BACKEND_DEPLOY_SSH_KEY: ${{ secrets.BACKEND_DEPLOY_SSH_KEY }}
          BACKEND_DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.BACKEND_DEPLOY_SSH_KNOWN_HOSTS }}
          BACKEND_DEPLOY_REMOTE_ENV_FILE: ${{ secrets.BACKEND_DEPLOY_REMOTE_ENV_FILE }}
          BACKEND_DEPLOY_REMOTE_REPO_DIR: ${{ secrets.BACKEND_DEPLOY_REMOTE_REPO_DIR }}
          BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES: ${{ secrets.BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          required_vars=(
            BACKEND_DEPLOY_SSH_HOST
            BACKEND_DEPLOY_SSH_USER
            BACKEND_DEPLOY_SSH_KEY
            BACKEND_DEPLOY_SSH_KNOWN_HOSTS
          )

          missing=0
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=deploy-backend::${name} missing; refusing SSH deploy."
              missing=1
            fi
          done

          if [ "${missing}" = "1" ]; then
            exit 1
          fi

          short_sha="${SHA:0:7}"
          remote_env_file="${BACKEND_DEPLOY_REMOTE_ENV_FILE:-/home/halil/platform/env/backend.env}"
          remote_repo_dir="${BACKEND_DEPLOY_REMOTE_REPO_DIR:-/home/halil/platform/repo}"
          remote_profiles="${BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES:-}"
          ssh_port="${BACKEND_DEPLOY_SSH_PORT:-22}"

          key_path="${RUNNER_TEMP}/backend_deploy_ssh_key"
          known_hosts_path="${RUNNER_TEMP}/backend_known_hosts"

          printf '%s' "${BACKEND_DEPLOY_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          printf '%s\n' "${BACKEND_DEPLOY_SSH_KNOWN_HOSTS}" > "${known_hosts_path}"
          chmod 600 "${known_hosts_path}"

          ssh_opts=(
            -i "${key_path}"
            -p "${ssh_port}"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${known_hosts_path}"
          )

          echo "::notice title=deploy-backend::Deploying sha-${short_sha} to ${BACKEND_DEPLOY_SSH_HOST}."
          ssh "${ssh_opts[@]}" "${BACKEND_DEPLOY_SSH_USER}@${BACKEND_DEPLOY_SSH_HOST}" \
            REMOTE_ENV_FILE="${remote_env_file}" \
            REMOTE_REPO_DIR="${remote_repo_dir}" \
            REMOTE_COMPOSE_PROFILES="${remote_profiles}" \
            GITHUB_ACTOR="${GITHUB_ACTOR}" \
            GITHUB_TOKEN="${GITHUB_TOKEN}" \
            TARGET_IMAGE_TAG="sha-${short_sha}" \
            'bash -se' <<'EOF'
          set -euo pipefail

          if [ ! -f "${REMOTE_ENV_FILE}" ]; then
            echo "[error] backend env file missing: ${REMOTE_ENV_FILE}" >&2
            exit 1
          fi

          set -a
          # shellcheck disable=SC1090
          . "${REMOTE_ENV_FILE}"
          set +a

          if [ ! -d "${REMOTE_REPO_DIR}/.git" ]; then
            if [ -z "${GIT_REMOTE_URL:-}" ]; then
              echo "[error] GIT_REMOTE_URL missing in ${REMOTE_ENV_FILE}" >&2
              exit 1
            fi
            mkdir -p "$(dirname "${REMOTE_REPO_DIR}")"
            git clone --branch "${REPO_BRANCH:-main}" --depth 1 "${GIT_REMOTE_URL}" "${REMOTE_REPO_DIR}"
          fi

          cd "${REMOTE_REPO_DIR}"
          chmod +x deploy/ubuntu/deploy-backend.sh deploy/ubuntu/rollback-backend.sh

          ENV_FILE="${REMOTE_ENV_FILE}" \
          REPO_DIR="${REMOTE_REPO_DIR}" \
          COMPOSE_PROFILES="${REMOTE_COMPOSE_PROFILES}" \
          GHCR_USERNAME="${GITHUB_ACTOR}" \
          GHCR_TOKEN="${GITHUB_TOKEN}" \
          TARGET_IMAGE_TAG="${TARGET_IMAGE_TAG}" \
          deploy/ubuntu/deploy-backend.sh
          EOF

      - name: Backend host deploy skipped
        if: ${{ env.DEPLOY_ENABLED == 'true' && env.BACKEND_SSH_DEPLOY_ENABLED != 'true' }}
        run: echo "::notice title=deploy-backend::Images pushed to GHCR; SSH host deploy skipped because BACKEND_SSH_DEPLOY_ENABLED!=true."
