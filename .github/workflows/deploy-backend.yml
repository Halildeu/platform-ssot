name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Deployment environment (informational)"
        required: true
        default: "stage"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      DEPLOY_ENABLED: ${{ secrets.DEPLOY_ENABLED }}

    steps:
      - name: Skip if deploy disabled
        if: ${{ env.DEPLOY_ENABLED != 'true' }}
        run: echo "::notice title=deploy-backend::DEPLOY_ENABLED!=true; skipping."

      - uses: actions/checkout@v4
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        with:
          python-version: "3.11"

      - name: Deploy gate (technical baseline + release contract)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          DEPLOY_SCOPE: ${{ github.event.inputs.env || 'stage' }}
          AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM: ${{ secrets.AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          scope="${DEPLOY_SCOPE}"
          echo "::notice title=deploy-backend::deploy_gate scope=${scope}"

          key_path=""
          if [ "${scope}" = "prod" ]; then
            if [ -z "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM:-}" ]; then
              echo "::error title=deploy-backend::AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM missing; refusing prod deploy."
              exit 1
            fi
            key_path="${RUNNER_TEMP}/autonomous_pipeline_signing_public.pem"
            printf "%s" "${AUTONOMOUS_PIPELINE_SIGNING_PUBLIC_KEY_PEM}" > "${key_path}"
            chmod 600 "${key_path}"
          fi

          if [ -n "${key_path}" ]; then
            python3 scripts/ops/deploy_scope_gate.py \
              --target backend \
              --scope "${scope}" \
              --public-key "${key_path}" \
              --out .cache/reports/deploy_scope_gate_backend.v1.json
          else
            python3 scripts/ops/deploy_scope_gate.py \
              --target backend \
              --scope "${scope}" \
              --out .cache/reports/deploy_scope_gate_backend.v1.json
          fi

      - name: Build & push images (required)
        if: ${{ env.DEPLOY_ENABLED == 'true' }}
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          echo "::add-mask::${GH_TOKEN}"
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

          echo "::group::docker compose build (backend/docker-compose.yml)"
          docker compose -f backend/docker-compose.yml build
          echo "::endgroup::"

          short_sha="${SHA:0:7}"
          stable_tag="main-stable"

          echo "::group::tag + push (serban-* -> ghcr.io/${GHCR_OWNER}/...)"
          images="$(docker image ls --format '{{.Repository}}:{{.Tag}}' | grep -E '^serban-' || true)"
          if [ -z "${images}" ]; then
            echo "::error title=deploy-backend::No serban-* images found; failing deploy-backend."
            exit 1
          fi

          while IFS= read -r img; do
            name="${img%%:*}"
            svc="${name#serban-}"
            target="ghcr.io/${GHCR_OWNER}/platform-ssot-${svc}"

            docker tag "${img}" "${target}:sha-${short_sha}"
            docker tag "${img}" "${target}:${stable_tag}"
            docker push "${target}:sha-${short_sha}"
            docker push "${target}:${stable_tag}"
          done <<< "${images}"
          echo "::endgroup::"
