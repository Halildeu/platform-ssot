name: gate-policy-dry-run
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  policy-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (optional)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; portable gate mode."
          fi

      - name: Policy dry-run (portable)
        run: |
          if [ -f ci/policy_dry_run.py ] && [ -d fixtures/envelopes ]; then
            python3 ci/policy_dry_run.py --fixtures fixtures/envelopes --out sim_report.json
          else
            echo "policy_dry_run fixture/senaryo yok; baseline standards checks ile devam."
            python3 ci/check_standards_lock.py
            python3 ci/check_module_delivery_lanes.py --strict
          fi
