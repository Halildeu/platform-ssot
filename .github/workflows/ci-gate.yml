name: ci-gate

on:
  pull_request: {}

concurrency:
  group: ci-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ci-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Detect change flags
        id: changes
        run: python3 scripts/ci_gate.py --emit-github-outputs

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.web_changed == 'true' || steps.changes.outputs.workflows_changed == 'true'
        with:
          node-version: 20

      - name: Install pnpm
        if: steps.changes.outputs.web_changed == 'true' || steps.changes.outputs.workflows_changed == 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - uses: actions/setup-java@v5
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.workflows_changed == 'true'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run ci-gate
        run: python3 scripts/ci_gate.py

      - name: Post ci-gate report to PR
        if: always()
        uses: actions/github-script@v8
        env:
          REPORT_PATH: artifacts/ci-gate-report.md
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- ci-gate:failure-digest -->';
            const reportPath = process.env.REPORT_PATH;
            const reportBody = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '(ci-gate report not found)';

            const body = `${marker}\n${reportBody}`.trim();

            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            try {
              const per_page = 100;
              let page = 1;
              let existing = null;

              while (true) {
                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page,
                  page,
                });

                for (const comment of comments) {
                  if (comment.body && comment.body.includes(marker)) {
                    existing = comment;
                    break;
                  }
                }

                if (existing || comments.length < per_page) {
                  break;
                }
                page += 1;
              }

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (err) {
              core.warning(`ci-gate digest comment failed: ${err?.message || err}`);
            }
