name: ci-gate

on:
  pull_request: {}

concurrency:
  group: ci-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.changes.outputs.docs_changed }}
      web_changed: ${{ steps.changes.outputs.web_changed }}
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      workflows_changed: ${{ steps.changes.outputs.workflows_changed }}
      legacy_archive_changed: ${{ steps.changes.outputs.legacy_archive_changed }}
      meta_changed: ${{ steps.changes.outputs.meta_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Detect change flags
        id: changes
        run: python3 scripts/ci_gate.py --emit-github-outputs

  ci-gate-docs:
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.docs_changed == 'true' || needs.classify.outputs.workflows_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run docs gate
        run: |
          python3 scripts/docflow_next.py render-flow --check
          python3 scripts/check_doc_templates.py
          python3 scripts/check_doc_ids.py
          python3 scripts/check_unique_delivery_ids.py
          python3 scripts/check_id_registry.py
          python3 scripts/check_doc_locations.py
          python3 scripts/check_acceptance_evidence.py
          python3 scripts/check_story_links.py
          python3 scripts/check_doc_chain.py
          python3 scripts/check_governance_migration.py
          python3 scripts/check_doc_maturity_rubric.py --flow-path docs/03-delivery/PROJECT-FLOW.tsv

  ci-gate-layout:
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.workflows_changed == 'true' || needs.classify.outputs.backend_changed == 'true' || needs.classify.outputs.web_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run layout gate
        run: |
          python3 scripts/check_backend_service_layout.py
          python3 scripts/check_web_mfe_layout.py

  ci-gate-web:
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.workflows_changed == 'true' || needs.classify.outputs.web_changed == 'true' || needs.classify.outputs.meta_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate
      - name: Run web gate
        run: |
          python3 scripts/check_version_gates.py --mode ci
          if command -v pnpm >/dev/null 2>&1; then pnpm -C web install --frozen-lockfile; else corepack pnpm -C web install --frozen-lockfile; fi
          npm -C web run tokens:build -- --check
          bash scripts/run_lint_web.sh
          bash scripts/run_tests_web.sh

  ci-gate-backend:
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.workflows_changed == 'true' || needs.classify.outputs.backend_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend gate
        working-directory: backend
        run: ./mvnw -DskipITs=true test

  ci-gate-legacy-archive:
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.legacy_archive_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run legacy archive gate
        run: |
          python3 scripts/ci/check_doc_zone_purity.py
          python3 ci/check_standards_lock.py

  ci-gate:
    runs-on: ubuntu-latest
    needs:
      - classify
      - ci-gate-docs
      - ci-gate-layout
      - ci-gate-web
      - ci-gate-backend
      - ci-gate-legacy-archive
    if: always()
    steps:
      - name: Build ci-gate report
        env:
          DOCS_CHANGED: ${{ needs.classify.outputs.docs_changed }}
          WEB_CHANGED: ${{ needs.classify.outputs.web_changed }}
          BACKEND_CHANGED: ${{ needs.classify.outputs.backend_changed }}
          WORKFLOWS_CHANGED: ${{ needs.classify.outputs.workflows_changed }}
          LEGACY_ARCHIVE_CHANGED: ${{ needs.classify.outputs.legacy_archive_changed }}
          META_CHANGED: ${{ needs.classify.outputs.meta_changed }}
          DOCS_RESULT: ${{ needs.ci-gate-docs.result }}
          LAYOUT_RESULT: ${{ needs.ci-gate-layout.result }}
          WEB_RESULT: ${{ needs.ci-gate-web.result }}
          BACKEND_RESULT: ${{ needs.ci-gate-backend.result }}
          LEGACY_ARCHIVE_RESULT: ${{ needs.ci-gate-legacy-archive.result }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import os
          from pathlib import Path

          flags = [
              ("docs_changed", os.environ["DOCS_CHANGED"]),
              ("web_changed", os.environ["WEB_CHANGED"]),
              ("backend_changed", os.environ["BACKEND_CHANGED"]),
              ("workflows_changed", os.environ["WORKFLOWS_CHANGED"]),
              ("legacy_archive_changed", os.environ["LEGACY_ARCHIVE_CHANGED"]),
              ("meta_changed", os.environ["META_CHANGED"]),
          ]
          gates = [
              ("docs", os.environ["DOCS_RESULT"]),
              ("layout", os.environ["LAYOUT_RESULT"]),
              ("web", os.environ["WEB_RESULT"]),
              ("backend", os.environ["BACKEND_RESULT"]),
              ("legacy-archive", os.environ["LEGACY_ARCHIVE_RESULT"]),
              ("security", "skipped"),
          ]

          overall = "PASS"
          for _, result in gates:
              if result not in {"success", "skipped"}:
                  overall = "FAIL"
                  break

          lines = [
              "# ci-gate summary",
              "",
              "## Overall",
              f"`{overall}`",
              "",
              "## Flags",
              "",
              "| Flag | Value |",
              "| --- | --- |",
          ]
          for name, value in flags:
              lines.append(f"| {name} | `{value}` |")

          lines.extend(["", "## Gates", "", "| Gate | Status |", "| --- | --- |"])
          for name, result in gates:
              lines.append(f"| {name} | `{result.upper()}` |")

          Path("artifacts/ci-gate-report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Post ci-gate report to PR
        if: always()
        uses: actions/github-script@v8
        env:
          REPORT_PATH: artifacts/ci-gate-report.md
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- ci-gate:failure-digest -->';
            const reportPath = process.env.REPORT_PATH;
            const reportBody = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '(ci-gate report not found)';

            const body = `${marker}\n${reportBody}`.trim();

            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            try {
              const per_page = 100;
              let page = 1;
              let existing = null;

              while (true) {
                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page,
                  page,
                });

                for (const comment of comments) {
                  if (comment.body && comment.body.includes(marker)) {
                    existing = comment;
                    break;
                  }
                }

                if (existing || comments.length < per_page) {
                  break;
                }
                page += 1;
              }

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (err) {
              core.warning(`ci-gate digest comment failed: ${err?.message || err}`);
            }

      - name: Gate check
        run: |
          set -euo pipefail
          failed=0
          require_green_or_skipped() {
            local gate="$1"
            local result="$2"
            case "${result}" in
              success|skipped)
                return 0
                ;;
              *)
                echo "::error title=ci-gate::${gate} result is ${result}; expected success or skipped."
                failed=1
                return 0
                ;;
            esac
          }
          require_green_or_skipped docs "${{ needs.ci-gate-docs.result }}"
          require_green_or_skipped layout "${{ needs.ci-gate-layout.result }}"
          require_green_or_skipped web "${{ needs.ci-gate-web.result }}"
          require_green_or_skipped backend "${{ needs.ci-gate-backend.result }}"
          require_green_or_skipped legacy-archive "${{ needs.ci-gate-legacy-archive.result }}"
          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi
