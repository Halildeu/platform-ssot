name: Vault → GitHub Secrets Sync (Manual)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync target (web-playwright|killswitch|backend-deploy|seed-backend-config|seed-backend-deploy|all)"
        required: true
        default: "web-playwright"
        type: choice
        options:
          - web-playwright
          - killswitch
          - backend-deploy
          - seed-backend-config
          - seed-backend-deploy
          - all
      env:
        description: "Vault env (stage|prod)"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - prod
      kv_mount:
        description: "Vault KV v2 mount name (örn: secret)"
        required: false
        default: "secret"
        type: string
      config_path:
        description: "KV path (default: <env>/web-playwright/config)"
        required: false
        default: "<env>/web-playwright/config"
        type: string
      keycloak_path:
        description: "KV path (default: <env>/web-playwright/keycloak)"
        required: false
        default: "<env>/web-playwright/keycloak"
        type: string
      killswitch_path:
        description: "KV path (default: <env>/ops/killswitches)"
        required: false
        default: "<env>/ops/killswitches"
        type: string
      backend_deploy_path:
        description: "KV path (default: <env>/ops/github/backend-deploy)"
        required: false
        default: "<env>/ops/github/backend-deploy"
        type: string
      backend_runtime_path:
        description: "KV path (default: <env>/backend-deploy/config)"
        required: false
        default: "<env>/backend-deploy/config"
        type: string
      secret_scope:
        description: "GitHub secret target scope (repo|environment)"
        required: false
        default: "environment"
        type: choice
        options:
          - environment
          - repo
      github_environment:
        description: "Secret scope=environment ise hedef environment adı"
        required: false
        default: "<env>"
        type: string
      ssh_host:
        description: "Seed mode: deploy SSH host"
        required: false
        default: "10.9.10.53"
        type: string
      ssh_port:
        description: "Seed mode: deploy SSH port"
        required: false
        default: "22"
        type: string
      ssh_user:
        description: "Seed mode: deploy SSH user"
        required: false
        default: "halil"
        type: string
      health_urls:
        description: "Seed mode: comma-separated backend health URLs"
        required: false
        default: "http://10.9.10.53:8082/actuator/health"
        type: string
      api_gateway_port:
        description: "Seed config mode: API gateway host port"
        required: false
        default: "8082"
        type: string
      ssh_key_path:
        description: "Seed mode: runner-local SSH private key path"
        required: false
        default: "~/.ssh/platform_ssot_backend_deploy_ed25519"
        type: string
      remote_env_file:
        description: "Seed mode: remote backend env file path"
        required: false
        default: "/home/halil/platform/env/backend.env"
        type: string
      remote_repo_dir:
        description: "Seed mode: remote repo checkout path"
        required: false
        default: "/home/halil/platform/repo"
        type: string
      remote_compose_profiles:
        description: "Seed mode: remote compose profiles"
        required: false
        default: ""
        type: string
      dry_run:
        description: "true: sadece key var/yok raporla; false: GitHub Secrets yaz"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: [self-hosted, vault-local]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure tooling (curl/jq + optional gh)
        shell: bash
        run: |
          set -euo pipefail
          command -v curl >/dev/null 2>&1 || { echo "[sync] HATA: curl yok. (macOS: zaten olmalı)"; exit 1; }
          command -v jq >/dev/null 2>&1 || { echo "[sync] HATA: jq yok. Kur: brew install jq"; exit 1; }
          # gh sadece dry_run=false için gerekli; burada zorunlu tutmuyoruz.

      - name: Sync Vault secrets to GitHub Secrets (safe, no value logs)
        shell: bash
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_SECRETS_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          set +x

          MODE="${{ inputs.mode }}"
          ENV_NAME="${{ inputs.env }}"
          KV_MOUNT_RAW="${{ inputs.kv_mount }}"
          CONFIG_PATH_RAW="${{ inputs.config_path }}"
          KEYCLOAK_PATH_RAW="${{ inputs.keycloak_path }}"
          KILLSWITCH_PATH_RAW="${{ inputs.killswitch_path }}"
          BACKEND_DEPLOY_PATH_RAW="${{ inputs.backend_deploy_path }}"
          BACKEND_RUNTIME_PATH_RAW="${{ inputs.backend_runtime_path }}"
          SECRET_SCOPE="${{ inputs.secret_scope }}"
          GITHUB_ENVIRONMENT_RAW="${{ inputs.github_environment }}"
          SSH_HOST="${{ inputs.ssh_host }}"
          SSH_PORT="${{ inputs.ssh_port }}"
          SSH_USER="${{ inputs.ssh_user }}"
          HEALTH_URLS="${{ inputs.health_urls }}"
          API_GATEWAY_PORT_INPUT="${{ inputs.api_gateway_port }}"
          SSH_KEY_PATH_RAW="${{ inputs.ssh_key_path }}"
          REMOTE_ENV_FILE_INPUT="${{ inputs.remote_env_file }}"
          REMOTE_REPO_DIR_INPUT="${{ inputs.remote_repo_dir }}"
          REMOTE_COMPOSE_PROFILES_INPUT="${{ inputs.remote_compose_profiles }}"
          DRY_RUN="${{ inputs.dry_run }}"

          if [ -z "${VAULT_ADDR:-}" ]; then
            echo "[sync] HATA: VAULT_ADDR secrets eksik."
            exit 1
          fi
          if [ -z "${VAULT_TOKEN:-}" ]; then
            echo "[sync] HATA: VAULT_TOKEN secrets eksik."
            exit 1
          fi

          echo "::add-mask::${VAULT_TOKEN}"

          if [ "${DRY_RUN}" != "true" ] && [ -z "${GH_TOKEN:-}" ]; then
            echo "[sync] HATA: GH_SECRETS_SYNC_TOKEN eksik (dry_run=false için gerekli)."
            exit 1
          fi

          VAULT_ADDR_CLEAN="${VAULT_ADDR%/}"
          KV_MOUNT="${KV_MOUNT_RAW#/}"
          KV_MOUNT="${KV_MOUNT%/}"

          CONFIG_PATH="${CONFIG_PATH_RAW//<env>/${ENV_NAME}}"
          KEYCLOAK_PATH="${KEYCLOAK_PATH_RAW//<env>/${ENV_NAME}}"
          KILLSWITCH_PATH="${KILLSWITCH_PATH_RAW//<env>/${ENV_NAME}}"
          BACKEND_DEPLOY_PATH="${BACKEND_DEPLOY_PATH_RAW//<env>/${ENV_NAME}}"
          BACKEND_RUNTIME_PATH="${BACKEND_RUNTIME_PATH_RAW//<env>/${ENV_NAME}}"
          GITHUB_ENVIRONMENT_NAME="${GITHUB_ENVIRONMENT_RAW//<env>/${ENV_NAME}}"
          CONFIG_PATH="${CONFIG_PATH#/}"
          KEYCLOAK_PATH="${KEYCLOAK_PATH#/}"
          KILLSWITCH_PATH="${KILLSWITCH_PATH#/}"
          BACKEND_DEPLOY_PATH="${BACKEND_DEPLOY_PATH#/}"
          BACKEND_RUNTIME_PATH="${BACKEND_RUNTIME_PATH#/}"
          GITHUB_ENVIRONMENT_NAME="${GITHUB_ENVIRONMENT_NAME#/}"

          echo "[sync] Mode=${MODE}, Env=${ENV_NAME}, kv_mount=${KV_MOUNT}, dry_run=${DRY_RUN}"
          if [ "${MODE}" = "web-playwright" ] || [ "${MODE}" = "all" ]; then
            echo "[sync] Reading: ${KV_MOUNT}/data/${CONFIG_PATH}"
            echo "[sync] Reading: ${KV_MOUNT}/data/${KEYCLOAK_PATH}"
          fi
          if [ "${MODE}" = "killswitch" ] || [ "${MODE}" = "all" ]; then
            echo "[sync] Reading: ${KV_MOUNT}/data/${KILLSWITCH_PATH}"
          fi
          if [ "${MODE}" = "backend-deploy" ] || [ "${MODE}" = "all" ]; then
            echo "[sync] Reading: ${KV_MOUNT}/data/${BACKEND_DEPLOY_PATH}"
          fi
          if [ "${MODE}" = "seed-backend-config" ]; then
            echo "[sync] Writing: ${KV_MOUNT}/data/${BACKEND_RUNTIME_PATH}"
          fi
          if [ "${MODE}" = "seed-backend-deploy" ]; then
            echo "[sync] Writing: ${KV_MOUNT}/data/${BACKEND_DEPLOY_PATH}"
          fi

          if [ "${MODE}" = "seed-backend-config" ]; then
            BACKEND_RUNTIME_URL="${VAULT_ADDR_CLEAN}/v1/${KV_MOUNT}/data/${BACKEND_RUNTIME_PATH}"
            existing_json="$(curl -sSf -H "X-Vault-Token: ${VAULT_TOKEN}" "${BACKEND_RUNTIME_URL}")"

            payload="$(
              BACKEND_RUNTIME_JSON="${existing_json}" \
              API_GATEWAY_PORT_INPUT="${API_GATEWAY_PORT_INPUT}" \
              python3 -c 'import json, os; existing = json.loads(os.environ["BACKEND_RUNTIME_JSON"]); data = existing.get("data", {}).get("data", {}); api_port = os.environ.get("API_GATEWAY_PORT_INPUT", "").strip(); data.update({"API_GATEWAY_PORT": api_port} if api_port else {}); print(json.dumps({"data": data}))'
            )"

            curl -sSf \
              -H "X-Vault-Token: ${VAULT_TOKEN}" \
              -H 'Content-Type: application/json' \
              -X POST "${BACKEND_RUNTIME_URL}" \
              -d "${payload}" >/dev/null

            echo "[sync] OK: seeded ${KV_MOUNT}/data/${BACKEND_RUNTIME_PATH}"
            exit 0
          fi

          if [ "${MODE}" = "seed-backend-deploy" ]; then
            expanded_key_path="${SSH_KEY_PATH_RAW/#\~/$HOME}"
            if [ ! -f "${expanded_key_path}" ]; then
              echo "[sync] HATA: SSH key not found at ${expanded_key_path}"
              exit 1
            fi

            ssh_known_hosts="$(ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" 2>/dev/null)"
            if [ -z "${ssh_known_hosts}" ]; then
              echo "[sync] HATA: ssh-keyscan returned no host keys for ${SSH_HOST}:${SSH_PORT}"
              exit 1
            fi

            ssh_private_key="$(cat "${expanded_key_path}")"

            payload="$(
              SSH_HOST="${SSH_HOST}" \
              SSH_PORT="${SSH_PORT}" \
              SSH_USER="${SSH_USER}" \
              HEALTH_URLS="${HEALTH_URLS}" \
              SSH_PRIVATE_KEY="${ssh_private_key}" \
              SSH_KNOWN_HOSTS="${ssh_known_hosts}" \
              REMOTE_ENV_FILE_INPUT="${REMOTE_ENV_FILE_INPUT}" \
              REMOTE_REPO_DIR_INPUT="${REMOTE_REPO_DIR_INPUT}" \
              REMOTE_COMPOSE_PROFILES_INPUT="${REMOTE_COMPOSE_PROFILES_INPUT}" \
              python3 -c 'import json, os; print(json.dumps({"data": {"BACKEND_SSH_DEPLOY_ENABLED": "true", "BACKEND_DEPLOY_SSH_HOST": os.environ["SSH_HOST"], "BACKEND_DEPLOY_SSH_PORT": os.environ["SSH_PORT"], "BACKEND_DEPLOY_SSH_USER": os.environ["SSH_USER"], "BACKEND_DEPLOY_SSH_KEY": os.environ["SSH_PRIVATE_KEY"], "BACKEND_DEPLOY_SSH_KNOWN_HOSTS": os.environ["SSH_KNOWN_HOSTS"], "BACKEND_DEPLOY_REMOTE_ENV_FILE": os.environ.get("REMOTE_ENV_FILE_INPUT", ""), "BACKEND_DEPLOY_REMOTE_REPO_DIR": os.environ.get("REMOTE_REPO_DIR_INPUT", ""), "BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES": os.environ.get("REMOTE_COMPOSE_PROFILES_INPUT", ""), "BACKEND_HEALTH_URLS": os.environ["HEALTH_URLS"]}}))'
            )"

            curl -sSf \
              -H "X-Vault-Token: ${VAULT_TOKEN}" \
              -H 'Content-Type: application/json' \
              -X POST "${VAULT_ADDR_CLEAN}/v1/${KV_MOUNT}/data/${BACKEND_DEPLOY_PATH}" \
              -d "${payload}" >/dev/null

            echo "[sync] OK: seeded ${KV_MOUNT}/data/${BACKEND_DEPLOY_PATH}"
            exit 0
          fi

          found=()
          missing=()
          optional_missing=()

          normalize_bool() {
            # Normalize Vault KV values for kill-switches (must be "true"/"false" string).
            local raw="$1"
            local v
            v="$(printf '%s' "${raw}" | tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            case "${v}" in
              true|false) printf '%s' "${v}"; return 0 ;;
              *) return 1 ;;
            esac
          }

          # Defaults (avoid set -u issues)
          PLAYWRIGHT_BASE_URL=""
          KEYCLOAK_TOKEN_URL=""
          KEYCLOAK_CLIENT_ID=""
          KEYCLOAK_CLIENT_SECRET=""
          KEYCLOAK_SCOPE=""
          AUTO_FIX_ENABLED=""
          DEPLOY_ENABLED=""
          ROLLBACK_ENABLED=""
          BACKEND_SSH_DEPLOY_ENABLED=""
          BACKEND_DEPLOY_SSH_HOST=""
          BACKEND_DEPLOY_SSH_PORT=""
          BACKEND_DEPLOY_SSH_USER=""
          BACKEND_DEPLOY_SSH_KEY=""
          BACKEND_DEPLOY_SSH_KNOWN_HOSTS=""
          BACKEND_DEPLOY_REMOTE_ENV_FILE=""
          BACKEND_DEPLOY_REMOTE_REPO_DIR=""
          BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES=""
          BACKEND_HEALTH_URLS=""

          if [ "${MODE}" = "web-playwright" ] || [ "${MODE}" = "all" ]; then
            # KV v2 reads (web-playwright)
            CONFIG_URL="${VAULT_ADDR_CLEAN}/v1/${KV_MOUNT}/data/${CONFIG_PATH}"
            KEYCLOAK_URL="${VAULT_ADDR_CLEAN}/v1/${KV_MOUNT}/data/${KEYCLOAK_PATH}"

            CONFIG_JSON="$(curl -sS -H "X-Vault-Token: ${VAULT_TOKEN}" "${CONFIG_URL}")"
            KEYCLOAK_JSON="$(curl -sS -H "X-Vault-Token: ${VAULT_TOKEN}" "${KEYCLOAK_URL}")"

            PLAYWRIGHT_BASE_URL="$(jq -r '.data.data.PLAYWRIGHT_BASE_URL // empty' <<<"${CONFIG_JSON}")"
            KEYCLOAK_TOKEN_URL="$(jq -r '.data.data.KEYCLOAK_TOKEN_URL // empty' <<<"${KEYCLOAK_JSON}")"
            KEYCLOAK_CLIENT_ID="$(jq -r '.data.data.KEYCLOAK_CLIENT_ID // empty' <<<"${KEYCLOAK_JSON}")"
            KEYCLOAK_CLIENT_SECRET="$(jq -r '.data.data.KEYCLOAK_CLIENT_SECRET // empty' <<<"${KEYCLOAK_JSON}")"
            KEYCLOAK_SCOPE="$(jq -r '.data.data.KEYCLOAK_SCOPE // empty' <<<"${KEYCLOAK_JSON}")"

            # Mask values even though we never print them.
            [ -n "${PLAYWRIGHT_BASE_URL}" ] && echo "::add-mask::${PLAYWRIGHT_BASE_URL}"
            [ -n "${KEYCLOAK_TOKEN_URL}" ] && echo "::add-mask::${KEYCLOAK_TOKEN_URL}"
            [ -n "${KEYCLOAK_CLIENT_ID}" ] && echo "::add-mask::${KEYCLOAK_CLIENT_ID}"
            [ -n "${KEYCLOAK_CLIENT_SECRET}" ] && echo "::add-mask::${KEYCLOAK_CLIENT_SECRET}"
            [ -n "${KEYCLOAK_SCOPE}" ] && echo "::add-mask::${KEYCLOAK_SCOPE}"

            if [ -n "${PLAYWRIGHT_BASE_URL}" ]; then found+=("PLAYWRIGHT_BASE_URL"); else missing+=("PLAYWRIGHT_BASE_URL"); fi
            if [ -n "${KEYCLOAK_TOKEN_URL}" ]; then found+=("KEYCLOAK_TOKEN_URL"); else missing+=("KEYCLOAK_TOKEN_URL"); fi
            if [ -n "${KEYCLOAK_CLIENT_ID}" ]; then found+=("KEYCLOAK_CLIENT_ID"); else missing+=("KEYCLOAK_CLIENT_ID"); fi
            if [ -n "${KEYCLOAK_CLIENT_SECRET}" ]; then found+=("KEYCLOAK_CLIENT_SECRET"); else missing+=("KEYCLOAK_CLIENT_SECRET"); fi
            if [ -n "${KEYCLOAK_SCOPE}" ]; then found+=("KEYCLOAK_SCOPE"); else optional_missing+=("KEYCLOAK_SCOPE"); fi
          fi

          if [ "${MODE}" = "killswitch" ] || [ "${MODE}" = "all" ]; then
            # KV v2 reads (killswitch)
            KILLSWITCH_URL="${VAULT_ADDR_CLEAN}/v1/${KV_MOUNT}/data/${KILLSWITCH_PATH}"
            KILLSWITCH_JSON="$(curl -sS -H "X-Vault-Token: ${VAULT_TOKEN}" "${KILLSWITCH_URL}")"

            auto_fix_raw="$(jq -r '.data.data.AUTO_FIX_ENABLED // empty' <<<"${KILLSWITCH_JSON}")"
            deploy_raw="$(jq -r '.data.data.DEPLOY_ENABLED // empty' <<<"${KILLSWITCH_JSON}")"
            rollback_raw="$(jq -r '.data.data.ROLLBACK_ENABLED // empty' <<<"${KILLSWITCH_JSON}")"

            AUTO_FIX_ENABLED="$(normalize_bool "${auto_fix_raw}" 2>/dev/null || true)"
            DEPLOY_ENABLED="$(normalize_bool "${deploy_raw}" 2>/dev/null || true)"
            ROLLBACK_ENABLED="$(normalize_bool "${rollback_raw}" 2>/dev/null || true)"

            [ -n "${AUTO_FIX_ENABLED}" ] && echo "::add-mask::${AUTO_FIX_ENABLED}"
            [ -n "${DEPLOY_ENABLED}" ] && echo "::add-mask::${DEPLOY_ENABLED}"
            [ -n "${ROLLBACK_ENABLED}" ] && echo "::add-mask::${ROLLBACK_ENABLED}"

            if [ -n "${AUTO_FIX_ENABLED}" ]; then found+=("AUTO_FIX_ENABLED"); else missing+=("AUTO_FIX_ENABLED"); fi
            if [ -n "${DEPLOY_ENABLED}" ]; then found+=("DEPLOY_ENABLED"); else missing+=("DEPLOY_ENABLED"); fi
            if [ -n "${ROLLBACK_ENABLED}" ]; then found+=("ROLLBACK_ENABLED"); else missing+=("ROLLBACK_ENABLED"); fi
          fi

          if [ "${MODE}" = "backend-deploy" ] || [ "${MODE}" = "all" ]; then
            BACKEND_DEPLOY_URL="${VAULT_ADDR_CLEAN}/v1/${KV_MOUNT}/data/${BACKEND_DEPLOY_PATH}"
            BACKEND_DEPLOY_JSON="$(curl -sS -H "X-Vault-Token: ${VAULT_TOKEN}" "${BACKEND_DEPLOY_URL}")"

            backend_enabled_raw="$(jq -r '.data.data.BACKEND_SSH_DEPLOY_ENABLED // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_SSH_DEPLOY_ENABLED="$(normalize_bool "${backend_enabled_raw}" 2>/dev/null || true)"
            BACKEND_DEPLOY_SSH_HOST="$(jq -r '.data.data.BACKEND_DEPLOY_SSH_HOST // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_SSH_PORT="$(jq -r '.data.data.BACKEND_DEPLOY_SSH_PORT // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_SSH_USER="$(jq -r '.data.data.BACKEND_DEPLOY_SSH_USER // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_SSH_KEY="$(jq -r '.data.data.BACKEND_DEPLOY_SSH_KEY // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_SSH_KNOWN_HOSTS="$(jq -r '.data.data.BACKEND_DEPLOY_SSH_KNOWN_HOSTS // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_REMOTE_ENV_FILE="$(jq -r '.data.data.BACKEND_DEPLOY_REMOTE_ENV_FILE // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_REMOTE_REPO_DIR="$(jq -r '.data.data.BACKEND_DEPLOY_REMOTE_REPO_DIR // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES="$(jq -r '.data.data.BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES // empty' <<<"${BACKEND_DEPLOY_JSON}")"
            BACKEND_HEALTH_URLS="$(jq -r '.data.data.BACKEND_HEALTH_URLS // empty' <<<"${BACKEND_DEPLOY_JSON}")"

            [ -n "${BACKEND_SSH_DEPLOY_ENABLED}" ] && echo "::add-mask::${BACKEND_SSH_DEPLOY_ENABLED}"
            [ -n "${BACKEND_DEPLOY_SSH_HOST}" ] && echo "::add-mask::${BACKEND_DEPLOY_SSH_HOST}"
            [ -n "${BACKEND_DEPLOY_SSH_PORT}" ] && echo "::add-mask::${BACKEND_DEPLOY_SSH_PORT}"
            [ -n "${BACKEND_DEPLOY_SSH_USER}" ] && echo "::add-mask::${BACKEND_DEPLOY_SSH_USER}"
            [ -n "${BACKEND_DEPLOY_REMOTE_ENV_FILE}" ] && echo "::add-mask::${BACKEND_DEPLOY_REMOTE_ENV_FILE}"
            [ -n "${BACKEND_DEPLOY_REMOTE_REPO_DIR}" ] && echo "::add-mask::${BACKEND_DEPLOY_REMOTE_REPO_DIR}"
            [ -n "${BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES}" ] && echo "::add-mask::${BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES}"
            [ -n "${BACKEND_HEALTH_URLS}" ] && echo "::add-mask::${BACKEND_HEALTH_URLS}"

            if [ -n "${BACKEND_SSH_DEPLOY_ENABLED}" ]; then found+=("BACKEND_SSH_DEPLOY_ENABLED"); else missing+=("BACKEND_SSH_DEPLOY_ENABLED"); fi

            if [ "${BACKEND_SSH_DEPLOY_ENABLED}" = "true" ]; then
              if [ -n "${BACKEND_DEPLOY_SSH_HOST}" ]; then found+=("BACKEND_DEPLOY_SSH_HOST"); else missing+=("BACKEND_DEPLOY_SSH_HOST"); fi
              if [ -n "${BACKEND_DEPLOY_SSH_USER}" ]; then found+=("BACKEND_DEPLOY_SSH_USER"); else missing+=("BACKEND_DEPLOY_SSH_USER"); fi
              if [ -n "${BACKEND_DEPLOY_SSH_KEY}" ]; then found+=("BACKEND_DEPLOY_SSH_KEY"); else missing+=("BACKEND_DEPLOY_SSH_KEY"); fi
              if [ -n "${BACKEND_DEPLOY_SSH_KNOWN_HOSTS}" ]; then found+=("BACKEND_DEPLOY_SSH_KNOWN_HOSTS"); else missing+=("BACKEND_DEPLOY_SSH_KNOWN_HOSTS"); fi
              if [ -n "${BACKEND_HEALTH_URLS}" ]; then found+=("BACKEND_HEALTH_URLS"); else missing+=("BACKEND_HEALTH_URLS"); fi
            else
              if [ -n "${BACKEND_DEPLOY_SSH_HOST}" ]; then found+=("BACKEND_DEPLOY_SSH_HOST"); else optional_missing+=("BACKEND_DEPLOY_SSH_HOST"); fi
              if [ -n "${BACKEND_DEPLOY_SSH_USER}" ]; then found+=("BACKEND_DEPLOY_SSH_USER"); else optional_missing+=("BACKEND_DEPLOY_SSH_USER"); fi
              if [ -n "${BACKEND_DEPLOY_SSH_KEY}" ]; then found+=("BACKEND_DEPLOY_SSH_KEY"); else optional_missing+=("BACKEND_DEPLOY_SSH_KEY"); fi
              if [ -n "${BACKEND_DEPLOY_SSH_KNOWN_HOSTS}" ]; then found+=("BACKEND_DEPLOY_SSH_KNOWN_HOSTS"); else optional_missing+=("BACKEND_DEPLOY_SSH_KNOWN_HOSTS"); fi
              if [ -n "${BACKEND_HEALTH_URLS}" ]; then found+=("BACKEND_HEALTH_URLS"); else optional_missing+=("BACKEND_HEALTH_URLS"); fi
            fi

            if [ -n "${BACKEND_DEPLOY_SSH_PORT}" ]; then found+=("BACKEND_DEPLOY_SSH_PORT"); else optional_missing+=("BACKEND_DEPLOY_SSH_PORT"); fi
            if [ -n "${BACKEND_DEPLOY_REMOTE_ENV_FILE}" ]; then found+=("BACKEND_DEPLOY_REMOTE_ENV_FILE"); else optional_missing+=("BACKEND_DEPLOY_REMOTE_ENV_FILE"); fi
            if [ -n "${BACKEND_DEPLOY_REMOTE_REPO_DIR}" ]; then found+=("BACKEND_DEPLOY_REMOTE_REPO_DIR"); else optional_missing+=("BACKEND_DEPLOY_REMOTE_REPO_DIR"); fi
            if [ -n "${BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES}" ]; then found+=("BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES"); else optional_missing+=("BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES"); fi
          fi

          echo "[sync] FOUND: ${found[*]:-none}"
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "[sync] MISSING (required): ${missing[*]}"
          fi
          if [ "${#optional_missing[@]}" -gt 0 ]; then
            echo "[sync] MISSING (optional): ${optional_missing[*]}"
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "[sync] HATA: Zorunlu key'ler eksik. Sync yapılmadı."
            exit 1
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            echo "[sync] dry_run=true => GitHub Secrets yazma adımı atlandı."
            exit 0
          fi

          # Write GitHub repo secrets (Actions). Values are never echoed.
          command -v gh >/dev/null 2>&1 || { echo "[sync] HATA: gh yok. Kur: brew install gh"; exit 1; }
          set_secret() {
            local name="$1"
            local value="$2"
            if [ "${SECRET_SCOPE}" = "environment" ]; then
              if [ -z "${GITHUB_ENVIRONMENT_NAME}" ]; then
                echo "[sync] HATA: github_environment empty while secret_scope=environment." >&2
                exit 1
              fi
              printf '%s' "${value}" | GH_TOKEN="${GH_TOKEN}" gh secret set "${name}" --env "${GITHUB_ENVIRONMENT_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null
              return 0
            fi

            printf '%s' "${value}" | GH_TOKEN="${GH_TOKEN}" gh secret set "${name}" --app actions --repo "${GITHUB_REPOSITORY}" >/dev/null
          }

          if [ "${MODE}" = "web-playwright" ] || [ "${MODE}" = "all" ]; then
