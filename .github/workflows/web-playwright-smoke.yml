name: Web Playwright Smoke

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "ci: Seviye 1, nightly: Seviye 1+2"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - nightly
      soft_mode:
        description: "1: Soft mode (job kırma yok), 0: Hard mode (FAIL -> job fail)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      auth_mode:
        description: "Auth modu"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - token_injection
      readonly_enforce:
        description: "Readonly enforcement (0: kapalı, 1: açık)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      base_url:
        description: "Playwright baseUrl (örn: http://localhost:3000)"
        required: true
        default: ""

jobs:
  pw-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate base_url
        run: |
          set -euo pipefail
          BASE_URL="${{ inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then
            echo "[pw-smoke] HATA: 'base_url' boş olamaz. Staging URL girin (örn: https://staging.example.com)."
            exit 1
          fi
          if [[ "$BASE_URL" == *localhost* ]] || [[ "$BASE_URL" == *127.0.0.1* ]]; then
            echo "[pw-smoke] HATA: CI'da localhost base_url kullanılamaz: $BASE_URL"
            exit 1
          fi

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run Playwright YAML smoke
        run: |
          set -e
          if [ "${{ inputs.mode }}" = "nightly" ]; then
            npm run pw:nightly
          else
            npm run pw:ci
          fi
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PW_SOFT_MODE: ${{ inputs.soft_mode || '0' }}
          PW_AUTH_MODE: ${{ inputs.auth_mode || 'none' }}
          PW_READONLY_ENFORCE: ${{ inputs.readonly_enforce || '0' }}
          KEYCLOAK_TOKEN_URL: ${{ secrets.KEYCLOAK_TOKEN_URL }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SCOPE: ${{ secrets.KEYCLOAK_SCOPE }}

      - name: Upload reports (pw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pw-reports
          path: web/test-results/pw
