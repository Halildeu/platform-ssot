name: module-delivery-lanes
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  module-delivery-contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Validate lane config + workflow contract
        run: |
          python3 ci/check_module_delivery_lanes.py --strict

      - name: Feature execution bridge gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-PM-SUITE/contract/check_feature_execution_contract.py \
              --repo-root . \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/feature_execution_contract_module_delivery.v1.json
          else
            python3 extensions/PRJ-PM-SUITE/contract/check_feature_execution_contract.py \
              --repo-root . \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/feature_execution_contract_module_delivery.v1.json
          fi

      - name: Delivery session packet build
        run: |
          python3 extensions/PRJ-PM-SUITE/contract/build_delivery_session_packet.py \
            --repo-root . \
            --out .cache/reports/delivery_session_packet_module_delivery.v1.json

      - name: Delivery session guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-PM-SUITE/contract/check_delivery_session_guard.py \
              --repo-root . \
              --packet .cache/reports/delivery_session_packet_module_delivery.v1.json \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/delivery_session_guard_module_delivery.v1.json
          else
            python3 extensions/PRJ-PM-SUITE/contract/check_delivery_session_guard.py \
              --repo-root . \
              --packet .cache/reports/delivery_session_packet_module_delivery.v1.json \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/delivery_session_guard_module_delivery.v1.json
          fi

      - name: UX catalog gate precheck
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-UX-NORTH-STAR/contract/check_ux_catalog_enforcement.py \
              --repo-root . \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/ux_catalog_enforcement_module_delivery.v1.json
          else
            python3 extensions/PRJ-UX-NORTH-STAR/contract/check_ux_catalog_enforcement.py \
              --repo-root . \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/ux_catalog_enforcement_module_delivery.v1.json
          fi

  module-lane-unit:
    runs-on: ubuntu-latest
    needs: [module-delivery-contract-check]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run unit lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane unit

  module-lane-database:
    runs-on: ubuntu-latest
    needs: [module-lane-unit]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run database lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane database

  module-lane-api:
    runs-on: ubuntu-latest
    needs: [module-lane-unit]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run api lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane api

  module-lane-contract:
    runs-on: ubuntu-latest
    needs: [module-lane-unit]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run contract lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane contract

  module-lane-integration:
    runs-on: ubuntu-latest
    needs: [module-lane-database, module-lane-api, module-lane-contract]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run integration lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane integration

  module-lane-e2e:
    runs-on: ubuntu-latest
    needs: [module-lane-integration]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run e2e lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane e2e

  module-delivery-gate:
    runs-on: ubuntu-latest
    needs:
      - module-lane-unit
      - module-lane-database
      - module-lane-api
      - module-lane-contract
      - module-lane-integration
      - module-lane-e2e
    if: always()
    steps:
      - name: Gate check
        run: |
          set -euo pipefail
          require_green_or_skipped() {
            local lane="$1"
            local result="$2"
            case "${result}" in
              success|skipped)
                return 0
                ;;
              *)
                echo "::error title=module-delivery-gate::${lane} lane result is ${result}; expected success or skipped."
                return 1
                ;;
            esac
          }
          echo "unit=${{ needs.module-lane-unit.result }}"
          echo "database=${{ needs.module-lane-database.result }}"
          echo "api=${{ needs.module-lane-api.result }}"
          echo "contract=${{ needs.module-lane-contract.result }}"
          echo "integration=${{ needs.module-lane-integration.result }}"
          echo "e2e=${{ needs.module-lane-e2e.result }}"
          require_green_or_skipped unit "${{ needs.module-lane-unit.result }}"
          require_green_or_skipped database "${{ needs.module-lane-database.result }}"
          require_green_or_skipped api "${{ needs.module-lane-api.result }}"
          require_green_or_skipped contract "${{ needs.module-lane-contract.result }}"
          require_green_or_skipped integration "${{ needs.module-lane-integration.result }}"
          require_green_or_skipped e2e "${{ needs.module-lane-e2e.result }}"
