name: module-delivery-lanes
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  module-delivery-contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Validate lane config + workflow contract
        run: |
          python3 ci/check_module_delivery_lanes.py --strict

      - name: Feature execution bridge gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-PM-SUITE/contract/check_feature_execution_contract.py \
              --repo-root . \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/feature_execution_contract_module_delivery.v1.json
          else
            python3 extensions/PRJ-PM-SUITE/contract/check_feature_execution_contract.py \
              --repo-root . \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/feature_execution_contract_module_delivery.v1.json
          fi

      - name: Delivery session packet build
        run: |
          python3 extensions/PRJ-PM-SUITE/contract/build_delivery_session_packet.py \
            --repo-root . \
            --out .cache/reports/delivery_session_packet_module_delivery.v1.json

      - name: Delivery session guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-PM-SUITE/contract/check_delivery_session_guard.py \
              --repo-root . \
              --packet .cache/reports/delivery_session_packet_module_delivery.v1.json \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/delivery_session_guard_module_delivery.v1.json
          else
            python3 extensions/PRJ-PM-SUITE/contract/check_delivery_session_guard.py \
              --repo-root . \
              --packet .cache/reports/delivery_session_packet_module_delivery.v1.json \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/delivery_session_guard_module_delivery.v1.json
          fi

      - name: UX catalog gate precheck
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_PARENT="$(git rev-parse HEAD^1)"
            PR_HEAD_PARENT="$(git rev-parse HEAD^2)"
            MERGE_BASE="$(git merge-base "${BASE_PARENT}" "${PR_HEAD_PARENT}")"
            python3 extensions/PRJ-UX-NORTH-STAR/contract/check_ux_catalog_enforcement.py \
              --repo-root . \
              --base "${MERGE_BASE}" \
              --head "${PR_HEAD_PARENT}" \
              --out .cache/reports/ux_catalog_enforcement_module_delivery.v1.json
          else
            python3 extensions/PRJ-UX-NORTH-STAR/contract/check_ux_catalog_enforcement.py \
              --repo-root . \
              --base "HEAD~1" \
              --head "HEAD" \
              --out .cache/reports/ux_catalog_enforcement_module_delivery.v1.json
          fi

  module-lane-unit:
    runs-on: ubuntu-latest
    needs: [module-delivery-contract-check]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run unit lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane unit
      - name: Upload unit lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-lane-unit-artifacts
          path: |
            .cache/reports/module_delivery_lanes/unit.v1.json
            .cache/reports/backend_build_guard.v1.json
            .cache/reports/backend_test_matrix
          if-no-files-found: warn

  module-lane-database:
    runs-on: ubuntu-latest
    needs: [module-lane-unit]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run database lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane database
      - name: Upload database lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-lane-database-artifacts
          path: |
            .cache/reports/module_delivery_lanes/database.v1.json
          if-no-files-found: warn

  module-lane-api:
    runs-on: ubuntu-latest
    needs: [module-lane-database]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run api lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane api
      - name: Upload api lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-lane-api-artifacts
          path: |
            .cache/reports/module_delivery_lanes/api.v1.json
            .cache/reports/backend_build_guard.v1.json
          if-no-files-found: warn

  module-lane-contract:
    runs-on: ubuntu-latest
    needs: [module-lane-api]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run contract lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane contract
      - name: Upload contract lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-lane-contract-artifacts
          path: |
            .cache/reports/module_delivery_lanes/contract.v1.json
            .cache/reports/web_build_guard.v1.json
            .cache/reports/web_runtime_guard.v1.json
            .cache/runtime_guard/web_start_session.v1.json
            web/logs
          if-no-files-found: warn

  module-lane-integration:
    runs-on: ubuntu-latest
    needs: [module-lane-contract]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run integration lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane integration
      - name: Upload integration lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-lane-integration-artifacts
          path: |
            .cache/reports/module_delivery_lanes/integration.v1.json
            .cache/reports/backend_runtime_guard.v1.json
            .cache/reports/backend_compose_runtime_guard.v1.json
            .cache/runtime_guard/backend_start_session.v1.json
            .cache/runtime_guard/backend_compose_session.v1.json
            backend/logs
          if-no-files-found: warn

  module-lane-e2e:
    runs-on: ubuntu-latest
    needs: [module-lane-integration]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt bulunamadi; lane baseline mode ile devam."
          fi
      - name: Run e2e lane
        run: |
          python3 ci/run_module_delivery_lane.py --lane e2e
      - name: Upload e2e lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-lane-e2e-artifacts
          path: |
            .cache/reports/module_delivery_lanes/e2e.v1.json
            .cache/reports/managed_repo_standards_sync/report.v1.json
          if-no-files-found: warn

  module-delivery-gate:
    runs-on: ubuntu-latest
    needs:
      - module-lane-unit
      - module-lane-database
      - module-lane-api
      - module-lane-contract
      - module-lane-integration
      - module-lane-e2e
    if: always()
    steps:
      - name: Gate check
        run: |
          set -euo pipefail
          echo "unit=${{ needs.module-lane-unit.result }}"
          echo "database=${{ needs.module-lane-database.result }}"
          echo "api=${{ needs.module-lane-api.result }}"
          echo "contract=${{ needs.module-lane-contract.result }}"
          echo "integration=${{ needs.module-lane-integration.result }}"
          echo "e2e=${{ needs.module-lane-e2e.result }}"
          test "${{ needs.module-lane-unit.result }}" = "success"
          test "${{ needs.module-lane-database.result }}" = "success"
          test "${{ needs.module-lane-api.result }}" = "success"
          test "${{ needs.module-lane-contract.result }}" = "success"
          test "${{ needs.module-lane-integration.result }}" = "success"
          test "${{ needs.module-lane-e2e.result }}" = "success"
