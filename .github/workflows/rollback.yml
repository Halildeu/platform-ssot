name: rollback

on:
  workflow_run:
    workflows: ["post-deploy-validate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ROLLBACK to confirm"
        required: true
        default: "NO"
      reason:
        description: "Reason for manual rollback (optional)"
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: rollback-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'ROLLBACK')
      || (github.event_name == 'workflow_run' && (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out'))
    env:
      ROLLBACK_ENABLED: ${{ secrets.ROLLBACK_ENABLED }}
      BACKEND_SSH_DEPLOY_ENABLED: ${{ secrets.BACKEND_SSH_DEPLOY_ENABLED }}

    steps:
      - name: Skip if rollback disabled
        if: ${{ env.ROLLBACK_ENABLED != 'true' }}
        run: echo "::notice title=rollback::ROLLBACK_ENABLED!=true; skipping rollback."

      - name: Rollback (required)
        if: ${{ env.ROLLBACK_ENABLED == 'true' }}
        env:
          WEB_ROLLBACK_HOOK_URL: ${{ secrets.WEB_ROLLBACK_HOOK_URL }}
          BACKEND_ROLLBACK_HOOK_URL: ${{ secrets.BACKEND_ROLLBACK_HOOK_URL }}
          BACKEND_DEPLOY_SSH_HOST: ${{ secrets.BACKEND_DEPLOY_SSH_HOST }}
          BACKEND_DEPLOY_SSH_PORT: ${{ secrets.BACKEND_DEPLOY_SSH_PORT }}
          BACKEND_DEPLOY_SSH_USER: ${{ secrets.BACKEND_DEPLOY_SSH_USER }}
          BACKEND_DEPLOY_SSH_KEY: ${{ secrets.BACKEND_DEPLOY_SSH_KEY }}
          BACKEND_DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.BACKEND_DEPLOY_SSH_KNOWN_HOSTS }}
          BACKEND_DEPLOY_REMOTE_ENV_FILE: ${{ secrets.BACKEND_DEPLOY_REMOTE_ENV_FILE }}
          BACKEND_DEPLOY_REMOTE_REPO_DIR: ${{ secrets.BACKEND_DEPLOY_REMOTE_REPO_DIR }}
          BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES: ${{ secrets.BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES }}
        shell: bash
        run: |
          set -euo pipefail
          set +x

          missing=0

          backend_mode=""
          if [ "${BACKEND_SSH_DEPLOY_ENABLED:-}" = "true" ]; then
            required_backend_ssh=(
              BACKEND_DEPLOY_SSH_HOST
              BACKEND_DEPLOY_SSH_USER
              BACKEND_DEPLOY_SSH_KEY
              BACKEND_DEPLOY_SSH_KNOWN_HOSTS
            )
            for name in "${required_backend_ssh[@]}"; do
              if [ -z "${!name:-}" ]; then
                echo "::error title=rollback::${name} missing; refusing backend SSH rollback."
                missing=1
              fi
            done
            backend_mode="ssh"
          elif [ -n "${BACKEND_ROLLBACK_HOOK_URL:-}" ]; then
            backend_mode="hook"
          else
            echo "::error title=rollback::No backend rollback path configured (SSH or hook)."
            missing=1
          fi

          if [ "${missing}" = "1" ]; then
            exit 1
          fi

          if [ -n "${WEB_ROLLBACK_HOOK_URL:-}" ]; then
            echo "::notice title=rollback::Triggering WEB rollback hook (URL hidden)."
            curl -fsS -X POST "${WEB_ROLLBACK_HOOK_URL}"
          else
            echo "::notice title=rollback::WEB_ROLLBACK_HOOK_URL missing; web rollback skipped."
          fi

          if [ "${backend_mode}" = "hook" ]; then
            echo "::notice title=rollback::Triggering BACKEND rollback hook (URL hidden)."
            curl -fsS -X POST "${BACKEND_ROLLBACK_HOOK_URL}"
          else
            ssh_port="${BACKEND_DEPLOY_SSH_PORT:-22}"
            remote_env_file="${BACKEND_DEPLOY_REMOTE_ENV_FILE:-/opt/platform/env/backend.env}"
            remote_repo_dir="${BACKEND_DEPLOY_REMOTE_REPO_DIR:-/opt/platform/repo}"
            remote_profiles="${BACKEND_DEPLOY_REMOTE_COMPOSE_PROFILES:-}"

            key_path="${RUNNER_TEMP}/backend_rollback_ssh_key"
            known_hosts_path="${RUNNER_TEMP}/backend_known_hosts"

            printf '%s' "${BACKEND_DEPLOY_SSH_KEY}" > "${key_path}"
            chmod 600 "${key_path}"
            printf '%s\n' "${BACKEND_DEPLOY_SSH_KNOWN_HOSTS}" > "${known_hosts_path}"
            chmod 600 "${known_hosts_path}"

            ssh_opts=(
              -i "${key_path}"
              -p "${ssh_port}"
              -o BatchMode=yes
              -o StrictHostKeyChecking=yes
              -o UserKnownHostsFile="${known_hosts_path}"
            )

            echo "::notice title=rollback::Triggering BACKEND rollback over SSH."
            ssh "${ssh_opts[@]}" "${BACKEND_DEPLOY_SSH_USER}@${BACKEND_DEPLOY_SSH_HOST}" \
              REMOTE_ENV_FILE="${remote_env_file}" \
              REMOTE_REPO_DIR="${remote_repo_dir}" \
              REMOTE_COMPOSE_PROFILES="${remote_profiles}" \
              'bash -se' <<'EOF'
            set -euo pipefail

            if [ ! -f "${REMOTE_ENV_FILE}" ]; then
              echo "[error] backend env file missing: ${REMOTE_ENV_FILE}" >&2
              exit 1
            fi

            set -a
            # shellcheck disable=SC1090
            . "${REMOTE_ENV_FILE}"
            set +a

            if [ ! -d "${REMOTE_REPO_DIR}/.git" ]; then
              if [ -z "${GIT_REMOTE_URL:-}" ]; then
                echo "[error] GIT_REMOTE_URL missing in ${REMOTE_ENV_FILE}" >&2
                exit 1
              fi
              mkdir -p "$(dirname "${REMOTE_REPO_DIR}")"
              git clone --branch "${REPO_BRANCH:-main}" --depth 1 "${GIT_REMOTE_URL}" "${REMOTE_REPO_DIR}"
            fi

            cd "${REMOTE_REPO_DIR}"
            chmod +x deploy/ubuntu/deploy-backend.sh deploy/ubuntu/rollback-backend.sh

            ENV_FILE="${REMOTE_ENV_FILE}" \
            REPO_DIR="${REMOTE_REPO_DIR}" \
            COMPOSE_PROFILES="${REMOTE_COMPOSE_PROFILES}" \
            deploy/ubuntu/rollback-backend.sh
            EOF
          fi

      - name: Incident comment (best-effort)
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- incident:v1 -->';
            const run = context.payload.workflow_run || {};
            const sha = run.head_sha || '';
            const runUrl = run.html_url || '';
            const rollbackEnabled = process.env.ROLLBACK_ENABLED === 'true';
            const { owner, repo } = context.repo;

            let prNumber = null;
            if (sha) {
              try {
                const resp = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
                  owner,
                  repo,
                  commit_sha: sha,
                  headers: { accept: 'application/vnd.github+json, application/vnd.github.groot-preview+json' },
                });
                const prs = Array.isArray(resp.data) ? resp.data : [];
                const merged = prs.find((p) => p && p.merged_at);
                const open = prs.find((p) => p && p.state === 'open');
                const cand = open || merged || prs[0];
                if (cand && Number.isInteger(cand.number)) {
                  prNumber = cand.number;
                }
              } catch (e) {
                core.notice(`PR lookup via commit->pulls failed: ${e.message}`);
              }
            }

            if (!prNumber) {
              core.notice('No PR found for this rollback run; skipping incident comment.');
              return;
            }

            const body = [
              marker,
              '## Incident (auto)',
              '',
              `- Trigger: post-deploy validation failed`,
              `- Rollback enabled: ${rollbackEnabled ? 'true' : 'false'}`,
              `- Run: ${runUrl}`,
              `- Head: ${String(sha).slice(0, 7)}`,
              '',
              `_${rollbackEnabled ? 'Rollback attempted' : 'Rollback skipped'} (best-effort). See workflow logs for details._`,
            ].join('\n');

            const comments = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.request('PATCH /repos/{owner}/{repo}/issues/comments/{comment_id}', {
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.notice(`Updated incident comment (id=${existing.id}).`);
              return;
            }

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
            core.notice('Created incident comment.');
