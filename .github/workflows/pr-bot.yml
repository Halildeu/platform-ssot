name: PR Bot

on:
  push:
    branches: ["fix/**", "wip/**", "docs/**", "ops/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-bot-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  pr-bot:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run PR bot (create PR + upsert comment)
        env:
          GH_TOKEN: ${{ secrets.GH_PR_BOT_TOKEN || secrets.GH_SECRETS_SYNC_TOKEN || github.token }}
        run: |
          set -e
          python3 scripts/pr_bot.py --rules-path docs/04-operations/PR-BOT-RULES.json
