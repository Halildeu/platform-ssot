name: PR Bot

on:
  push:
    branches: ["fix/**", "wip/**", "docs/**", "ops/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-bot-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  pr-bot:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Token preflight (safe)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api /user --silent >/dev/null; then
            echo "::notice title=PR Bot token::github.token OK (gh api /user 200)"
            echo "✅ PR Bot token preflight: OK (github.token)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=PR Bot token::github.token FAILED (cannot call /user)"
            echo "❌ PR Bot token preflight: FAILED (github.token)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Run PR bot (create PR + upsert comment)
        id: pr_bot
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 scripts/pr_bot.py --rules-path docs/04-operations/PR-BOT-RULES.json 2>&1 | tee artifacts/pr-bot.log

      - name: PR Bot failure summary
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          LAST_ERR=""
          if [ -f artifacts/pr-bot.log ]; then
            LAST_ERR="$(grep -E '\\[pr-bot\\] HATA:|GitHub API HTTP|not all refs are readable|^HATA:' artifacts/pr-bot.log | tail -n 1 || true)"
          fi
          if [ -z "${LAST_ERR}" ]; then
            LAST_ERR="PR Bot step failed. See logs for details."
          fi

          # Annotation (token yok; tek satır; GitHub escaping)
          esc="${LAST_ERR//%/%25}"
          esc="${esc//$'\\n'/%0A}"
          esc="${esc//$'\\r'/%0D}"
          echo "::error title=PR Bot Failed::${esc}"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## PR Bot Failure"
              echo ""
              echo "- Run: ${RUN_URL}"
              echo "- Last error: \`${LAST_ERR}\`"
              echo ""
              echo "### Tail (artifacts/pr-bot.log)"
              echo '```text'
              if [ -f artifacts/pr-bot.log ]; then
                tail -n 120 artifacts/pr-bot.log || true
              else
                echo "(artifacts/pr-bot.log not found)"
              fi
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
