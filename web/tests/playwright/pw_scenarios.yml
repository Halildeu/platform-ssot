version: 1

# Varsayılan baseUrl Playwright config’ten gelir (PLAYWRIGHT_BASE_URL).
# Buradaki değer yalnızca fallback olarak kullanılır.
baseUrl: http://localhost:3000

defaults:
  fail_on_console_error: true
  warn_on_console_warn: true

  # Bazı browser/iframe uyarıları (özellikle Keycloak silent-check) gürültü üretebilir.
  console_warn_allowlist:
    - "sandbox attribute can escape its sandboxing"

  console_error_allowlist: []

  # Network allowlist: URL veya status pattern (regex string).
  network_allowlist:
    - url: "/silent-check-sso\\.html"
      status: "200|204"

scenarios:
  - name: shell_login
    level: 1
    auth_required: false
    console_error_allowlist:
      - "http://localhost:3001/remoteEntry\\.js"
      - "http://localhost:3002/remoteEntry\\.js"
      - "http://localhost:3004/remoteEntry\\.js"
      - "http://localhost:3005/remoteEntry\\.js"
      - "http://localhost:3006/remoteEntry\\.js"
      - "http://localhost:3007/remoteEntry\\.js"
    console_warn_allowlist:
      - "Initialization of sharing external failed:[\\s\\S]*http://localhost:3001/remoteEntry\\.js"
      - "Initialization of sharing external failed:[\\s\\S]*http://localhost:3002/remoteEntry\\.js"
      - "Initialization of sharing external failed:[\\s\\S]*http://localhost:3004/remoteEntry\\.js"
      - "Initialization of sharing external failed:[\\s\\S]*http://localhost:3005/remoteEntry\\.js"
      - "Initialization of sharing external failed:[\\s\\S]*http://localhost:3006/remoteEntry\\.js"
      - "Initialization of sharing external failed:[\\s\\S]*http://localhost:3007/remoteEntry\\.js"
    steps:
      - goto: /login
      - expectVisible: '[data-testid="login-title"]'

