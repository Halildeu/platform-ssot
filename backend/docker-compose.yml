name: serban

services:
  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres-db:
    image: pgvector/pgvector:pg18
    ports:
      - "5432:5432"
    networks:
      - microservice-network
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-users}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./devops/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports:
      - "8089:8089"
    networks:
      - microservice-network
    environment:
      SPRING_PROFILES_ACTIVE: ${USER_SERVICE_PROFILES:-local,docker}
      SERVICE_JWT_PRIVATE_KEY: ${SERVICE_JWT_PRIVATE_KEY:-}
      SERVICE_JWT_PUBLIC_KEY: ${SERVICE_JWT_PUBLIC_KEY:-}
      SERVICE_JWT_KEY_ID: ${SERVICE_JWT_KEY_ID:-local-service-jwt}
      SPRING_CLOUD_VAULT_ENABLED: "false"
      SPRING_CLOUD_VAULT_FAIL_FAST: "false"
      SPRING_CLOUD_VAULT_KV_ENABLED: "false"
      PERMISSION_SERVICE_BASE_URL: ${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      SERVICE_TOKEN_MINT_URL: ${SERVICE_TOKEN_MINT_URL:-http://auth-service:8088/oauth2/token}
      USER_DB_SCHEMA: ${USER_DB_SCHEMA:-public}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # RS256/JWKS doğrulaması
      SECURITY_JWT_JWK_SET_URI: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_USER_JWK_SET_URI: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_ISSUER: http://keycloak:8080/realms/serban
      SECURITY_JWT_AUDIENCE: user-service
      # Service token doğrulaması için auth-service JWKS (lokal senaryo)
      SERVICE_AUTH_JWK_SET_URI: ${SERVICE_AUTH_JWK_SET_URI:-http://auth-service:8088/oauth2/jwks}
      SERVICE_AUTH_ISSUER: ${SERVICE_AUTH_ISSUER:-auth-service}
      # Ek issuer/JWKS listesi Keycloak serban realm'ini işaret eder
      SECURITY_JWT_JWK_SET_URIS: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_ISSUERS: http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8088:8088"
    networks:
      - microservice-network
    environment:
      SPRING_PROFILES_ACTIVE: ${AUTH_SERVICE_PROFILES:-local,docker}
      SERVICE_JWT_PRIVATE_KEY: ${SERVICE_JWT_PRIVATE_KEY:-}
      SERVICE_JWT_PUBLIC_KEY: ${SERVICE_JWT_PUBLIC_KEY:-}
      SERVICE_JWT_KEY_ID: ${SERVICE_JWT_KEY_ID:-local-service-jwt}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-32-bytes-placeholder}
      SPRING_CLOUD_VAULT_ENABLED: "false"
      SPRING_CLOUD_VAULT_FAIL_FAST: "false"
      SPRING_CLOUD_VAULT_KV_ENABLED: "false"
      PERMISSION_SERVICE_BASE_URL: ${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:-http://user-service}
      AUTH_DB_SCHEMA: ${AUTH_DB_SCHEMA:-public}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-users}
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME:-postgres}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LOG_SECURITY_LEVEL: ${LOG_SECURITY_LEVEL:-DEBUG}
    depends_on:
      discovery-server:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  variant-service:
    build:
      context: .
      dockerfile: ./variant-service/Dockerfile
    ports:
      - "8091:8091"
    networks:
      - microservice-network
    environment:
      SPRING_PROFILES_ACTIVE: ${VARIANT_SERVICE_PROFILES:-local,docker}
      SPRING_CLOUD_VAULT_ENABLED: "false"
      SPRING_CLOUD_VAULT_FAIL_FAST: "false"
      SPRING_CLOUD_VAULT_KV_ENABLED: "false"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # RS256/JWKS doğrulaması (user JWT — issuer localhost:8081 for frontend tokens)
      SECURITY_JWT_JWK_SET_URI: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_ISSUER: http://localhost:8081/realms/serban
      SECURITY_JWT_ISSUERS: http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban
      SERVICE_AUTH_JWK_SET_URI: http://auth-service:8088/oauth2/jwks
      SERVICE_AUTH_ISSUER: auth-service
      SECURITY_JWT_AUDIENCE: variant-service
      # Opsiyonel diğer ayarlar
      VARIANT_DB_URL: ${VARIANT_DB_URL}
      VARIANT_DB_USERNAME: ${VARIANT_DB_USERNAME}
      VARIANT_DB_PASSWORD: ${VARIANT_DB_PASSWORD}
      VARIANT_DB_SCHEMA: ${VARIANT_DB_SCHEMA:-variant_service}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  core-data-service:
    build:
      context: .
      dockerfile: ./core-data-service/Dockerfile
    ports:
      - "8092:8092"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${CORE_DATA_SERVICE_PROFILES:-local,docker}
      - SERVER_PORT=8092
      - SPRING_DATASOURCE_URL=${CORE_DATA_DB_URL:-jdbc:postgresql://postgres-db:5432/users}
      - SPRING_DATASOURCE_USERNAME=${CORE_DATA_DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${CORE_DATA_DB_PASSWORD:-postgres}
      - CORE_DATA_DB_SCHEMA=${CORE_DATA_DB_SCHEMA:-core_data_service}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - SECURITY_JWT_JWK_SET_URI=${SECURITY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      - SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      - SECURITY_JWT_AUDIENCE=${CORE_DATA_SECURITY_JWT_AUDIENCE:-frontend,user-service,core-data-service}
      - ERP_OPENFGA_ENABLED=${ERP_OPENFGA_ENABLED:-false}
      - ERP_OPENFGA_API_URL=${ERP_OPENFGA_API_URL:-http://openfga:4000}
      - ERP_OPENFGA_STORE_ID=${ERP_OPENFGA_STORE_ID:-}
      - ERP_OPENFGA_MODEL_ID=${ERP_OPENFGA_MODEL_ID:-}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      openfga:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${API_GATEWAY_PROFILES:-local,docker}
      # RS256/JWKS doğrulaması gateway tarafında Keycloak JWKS üzerinden yapılır
      - SECURITY_JWT_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUER=http://keycloak:8080/realms/serban
      - SECURITY_JWT_AUDIENCE=user-service,permission-service,variant-service,core-data-service
      # Ek issuer: Keycloak (lokal dev)
      - SECURITY_JWT_JWK_SET_URIS=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUERS=http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban
      - SECURITY_JWT_SECONDARY_ISSUER=http://localhost:8081/realms/serban
      - SECURITY_JWT_SECONDARY_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SPRING_CLOUD_VAULT_ENABLED="false"
      - SPRING_CLOUD_VAULT_FAIL_FAST="false"
      - SPRING_CLOUD_VAULT_KV_ENABLED="false"
      - SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID=${VAULT_ROLE_ID:-}
      - SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID=${VAULT_SECRET_ID:-}
    depends_on:
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      variant-service:
        condition: service_healthy
      core-data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: ${KEYCLOAK_START_COMMAND:-start-dev --import-realm}
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # v26: KC_HOSTNAME_STRICT replaced by KC_HOSTNAME
      # start-dev modunda hostname kontrolü otomatik kapalı
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_DEBUG=true
    ports:
      - "8081:8080"
    networks:
      - microservice-network
    volumes:
      - backend_keycloak_data:/opt/keycloak/data
      - ./backend/keycloak/exports:/opt/keycloak/data/import
      - ./backend/keycloak/themes:/opt/keycloak/themes
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 20s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.21.4
    container_name: backend-vault-1
    user: "0:0"
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    ports:
      - "8200:8200"
      - "8201:8201"
    networks:
      - microservice-network
    volumes:
      - vault-data:/vault/file
      - ./devops/vault:/vault/config:ro
    healthcheck:
      # vault status: exit 0=unsealed+healthy, exit 1=error, exit 2=sealed
      # unseal-loop scripti otomatik acar, sonra exit 0 doner
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s

  vault-unseal:
    image: hashicorp/vault:1.21.4
    depends_on:
      vault:
        condition: service_started
    networks:
      - microservice-network
    volumes:
      - ./.vault-dev:/vault-dev:ro
      - ./devops/vault:/vault/config:ro
    environment:
      VAULT_ADDR: http://vault:8200
    command: ["/bin/sh", "/vault/config/dev-unseal-loop.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://vault:8200"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s

  openfga-migrate:
    image: openfga/openfga:latest
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga"
    networks:
      - microservice-network
    depends_on:
      postgres-db:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga"
      OPENFGA_PLAYGROUND_ENABLED: "true"
      OPENFGA_LOG_LEVEL: info
    ports:
      - "4000:8080"
      - "4001:8081"
      - "4002:3000"
    networks:
      - microservice-network
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["NONE"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  permission-service:
    profiles: ["legacy"]  # Only starts with: docker compose --profile legacy up
    build: ./permission-service
    ports:
      - "8090:8084"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${PERMISSION_SERVICE_PROFILES:-local,docker}
      - PERMISSION_DB_URL=${PERMISSION_DB_URL:-jdbc:postgresql://postgres-db:5432/users}
      - PERMISSION_DB_USERNAME=${PERMISSION_DB_USERNAME:-postgres}
      - PERMISSION_DB_PASSWORD=${PERMISSION_DB_PASSWORD:-postgres}
      - PERMISSION_DB_SCHEMA=${PERMISSION_DB_SCHEMA:-public}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_CLOUD_VAULT_ENABLED=false
      - SPRING_CLOUD_VAULT_FAIL_FAST=false
      - SPRING_CLOUD_VAULT_KV_ENABLED=false
      # Legacy internal API key doğrulaması kapatıldı (JWT zorunlu)
      - SECURITY_LEGACY_API_KEY_ENABLED=false
      # User JWT'leri için RS256 (JWK) doğrulaması. FE token'ları Keycloak (serban) realm'inden gelir.
      - SECURITY_JWT_USER_JWK_SET_URI=${SECURITY_JWT_USER_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      # RS256 için JWKS ayarı (service tokens)
      - SECURITY_JWT_JWK_SET_URI=${SECURITY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      - SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      # Audience doğrulaması; token üretimindeki aud ile eşleşmeli
      - SECURITY_JWT_AUDIENCE=${SECURITY_JWT_AUDIENCE:-permission-service}
      # Ek issuer listesi Keycloak serban realm'i işaret eder
      - SECURITY_JWT_JWK_SET_URIS=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUERS=http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban
      # Secondary issuer: frontend tokens come from localhost:8081
      - SECURITY_JWT_SECONDARY_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_SECONDARY_ISSUER=http://localhost:8081/realms/serban
      - SECURITY_JWT_SECONDARY_AUDIENCE=permission-service
      - PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE:-user_service.users}
      - PERMISSION_AUTHZ_USER_TABLE=${PERMISSION_AUTHZ_USER_TABLE:-user_service.users}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  report-service:
    build:
      context: .
      dockerfile: ./report-service/Dockerfile
    ports:
      - "8095:8095"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${REPORT_SERVICE_PROFILES:-local,docker}
      - SERVER_PORT=8095
      - REPORT_MSSQL_HOST=${REPORT_MSSQL_HOST:-host.docker.internal}
      - REPORT_MSSQL_PORT=${REPORT_MSSQL_PORT:-1433}
      - REPORT_MSSQL_DB=${REPORT_MSSQL_DB:-reporting}
      - REPORT_MSSQL_USERNAME=${REPORT_MSSQL_USERNAME:-sa}
      - REPORT_MSSQL_PASSWORD=${REPORT_MSSQL_PASSWORD:-}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - SECURITY_JWT_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUER=http://keycloak:8080/realms/serban
      - SECURITY_JWT_AUDIENCE=report-service,account,frontend
      - PERMISSION_SERVICE_INTERNAL_API_KEY=${PERMISSION_SERVICE_INTERNAL_API_KEY:-dev-local-audit-mirror-key}
      # SQL Server baglantisi optional — erisim yoksa servis yine de baslar
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      # DB health indicator'u devre disi birak (SQL Server ulasılamaz oldugunda timeout yapar)
      - MANAGEMENT_HEALTH_DB_ENABLED=false
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8095/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  schema-service:
    build:
      context: .
      dockerfile: ./schema-service/Dockerfile
    ports:
      - "8096:8096"
    networks:
      - microservice-network
    environment:
      - SERVER_PORT=8096
      - SCHEMA_MSSQL_HOST=${REPORT_MSSQL_HOST:-host.docker.internal}
      - SCHEMA_MSSQL_PORT=${REPORT_MSSQL_PORT:-1433}
      - SCHEMA_MSSQL_DB=${REPORT_MSSQL_DB:-workcube_mikrolink}
      - SCHEMA_MSSQL_USERNAME=${REPORT_MSSQL_USERNAME:-sa}
      - SCHEMA_MSSQL_PASSWORD=${REPORT_MSSQL_PASSWORD:-}
      - SCHEMA_DEFAULT_SCHEMA=${SCHEMA_DEFAULT_SCHEMA:-workcube_mikrolink}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - SECURITY_JWT_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUER=http://keycloak:8080/realms/serban
      - AUTH_MODE=${AUTH_MODE:-permitAll}
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      - MANAGEMENT_HEALTH_DB_ENABLED=false
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.5.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability-network
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.7.2
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./infra/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    networks:
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  observability-prometheus:
    image: prom/prometheus:latest
    container_name: observability-prometheus
    volumes:
      - ./scripts/perf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - observability-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  observability-grafana:
    image: grafana/grafana:12.4.1
    container_name: observability-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3010:3000"
    volumes:
      - ./scripts/perf/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./scripts/perf/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./scripts/perf/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./docs/observability:/var/lib/grafana/dashboards:ro
    networks:
      - observability-network
    depends_on:
      observability-prometheus:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  backend_keycloak_data:
  vault-data:
  loki-data:
  tempo-data:

networks:
