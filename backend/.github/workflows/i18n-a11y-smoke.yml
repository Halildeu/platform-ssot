name: i18n & A11y Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  i18n-a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate i18n dictionaries (local-only)
        run: npm run i18n:pull -- --local-only

      - name: Generate pseudolocale dictionaries
        run: npm run i18n:pseudo

      - name: Build audit bundle for axe smoke
        run: npm run quality:audit:build

      - name: Run axe-core CLI smoke
        run: npm run test:a11y
