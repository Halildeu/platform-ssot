# Varsayılan olarak 'local' profilini aktif et.
spring.profiles.active=local

# --- ORTAK AYARLAR ---
spring.application.name=api-gateway
server.port=8080

# Actuator & Health Check Ayarları
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Eureka Client Ayarları (ortak olanlar)
eureka.instance.prefer-ip-address=true
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health

# Spring Cloud Gateway Ayarları
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.routes[0].id=auth-service-route
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[1].id=user-service-route
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
# Kullanıcı servis rotası
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=variant-service-route
spring.cloud.gateway.routes[2].uri=lb://VARIANT-SERVICE
# Varyant servis rotası
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/variants/**

spring.cloud.gateway.routes[3].id=permission-service-route
spring.cloud.gateway.routes[3].uri=lb://PERMISSION-SERVICE
# Yetki servis rotası
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/permissions/**

# Access (roles/policies) rotası aynı servise yönlenir
spring.cloud.gateway.routes[4].id=permission-access-route
spring.cloud.gateway.routes[4].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/access/**

# Audit events endpoint (permission-service)
spring.cloud.gateway.routes[5].id=permission-audit-route
spring.cloud.gateway.routes[5].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/audit/**

# --- v1 REST path'leri (legacy path'ler korunur) ---
spring.cloud.gateway.routes[6].id=auth-service-v1-route
spring.cloud.gateway.routes[6].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[7].id=user-service-v1-route
spring.cloud.gateway.routes[7].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/users/**,/api/v1/notification-preferences/**

spring.cloud.gateway.routes[8].id=variant-service-v1-route
spring.cloud.gateway.routes[8].uri=lb://VARIANT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/variants/**

spring.cloud.gateway.routes[12].id=variant-service-v1-theme-route
spring.cloud.gateway.routes[12].uri=lb://VARIANT-SERVICE
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/v1/themes/**,/api/v1/me/theme/**,/api/v1/theme-registry/**

spring.cloud.gateway.routes[9].id=permission-service-v1-roles-route
spring.cloud.gateway.routes[9].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/roles/**

spring.cloud.gateway.routes[10].id=permission-service-v1-permissions-route
spring.cloud.gateway.routes[10].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/permissions/**

spring.cloud.gateway.routes[13].id=permission-service-v1-authz-route
spring.cloud.gateway.routes[13].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/v1/authz/**

# core-data-service v1 path
spring.cloud.gateway.routes[11].id=core-data-service-v1-route
spring.cloud.gateway.routes[11].uri=lb://CORE-DATA-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/v1/companies/**

# Report service v1 path
spring.cloud.gateway.routes[14].id=report-service-v1-route
spring.cloud.gateway.routes[14].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/v1/reports/**

# Dashboard service v1 path (routed to report-service)
spring.cloud.gateway.routes[15].id=dashboard-service-v1-route
spring.cloud.gateway.routes[15].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/v1/dashboards/**

# Global CORS Ayarları
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://localhost:3004
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# Logging Ayarları
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
# JWT doğrulama katmanında ayrıntılı log için
logging.level.org.springframework.security.oauth2.jwt=DEBUG
logging.level.org.springframework.security.oauth2.server.resource=DEBUG

# JWT doğrulama (env ile override edilir)
# Default: Keycloak serban realm
SECURITY_JWT_JWK_SET_URI=${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
# Çoklu issuer desteği için opsiyonel liste (virgül ile ayır)
# Örn: SECURITY_JWT_JWK_SET_URIS=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
#      SECURITY_JWT_ISSUERS=http://keycloak:8080/realms/serban
# SECURITY_JWT_AUDIENCE opsiyonel; kullanıcı token’larında route bazlı kontrol tercih edilebilir
# Varsayılan aud listesine variant-service eklendi; gerekirse env ile override edilir.
SECURITY_JWT_AUDIENCE=${SECURITY_JWT_AUDIENCE:variant-service}

# Spring Cloud 2025.0.1 LoadBalancer — retry ve health check ayarları
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.max-retries-on-same-service-instance=1
spring.cloud.loadbalancer.retry.max-retries-on-next-service-instance=1
spring.cloud.loadbalancer.health-check.initial-delay=5s
spring.cloud.loadbalancer.health-check.interval=10s

# Gateway metrics (routeId etiketi için)
spring.cloud.gateway.metrics.enabled=true
