spring:
  cloud:
    vault:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/serban
          jwk-set-uri: http://localhost:8081/realms/serban/protocol/openid-connect/certs

service-jwt:
  issuer: "test-issuer"
  kid: "test-key"
  private-key: |-
    -----BEGIN PRIVATE KEY-----
    FAKE-TEST-KEY
    -----END PRIVATE KEY-----
  public-key: |-
    -----BEGIN PUBLIC KEY-----
    FAKE-TEST-PUB
    -----END PUBLIC KEY-----
  expiration: 300

rate-limit:
  max-requests: 10
  window-seconds: 1

security:
  service-mint:
    allowed-audiences: permission-service
    allowed-permissions: permissions:read
  service-token:
    audience: permission-service
    permissions: permissions:read

jwt:
  issuer: test-issuer
