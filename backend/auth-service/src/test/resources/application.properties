spring.profiles.active=local,dev,test
spring.config.import=
spring.cloud.vault.enabled=false
management.health.vault.enabled=false
spring.main.banner-mode=off
spring.jpa.open-in-view=false
spring.cloud.service-registry.auto-registration.enabled=false

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

eureka.client.enabled=false
spring.cloud.discovery.enabled=false
management.endpoints.access.default=none
management.prometheus.metrics.export.enabled=false
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.netflix.discovery=OFF
logging.level.org.springframework.cloud.netflix.eureka=OFF
logging.level.com.example=ERROR

# Service token claims
service-token.environment=test
security.jwt.issuer=http://localhost/auth-service
service.jwt.key-id=test-key

# Disable real JWT fetch in tests
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/serban/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/serban
