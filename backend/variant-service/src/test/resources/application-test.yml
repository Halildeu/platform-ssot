spring:
  cloud:
    vault:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/serban
          jwk-set-uri: http://localhost:8081/realms/serban/protocol/openid-connect/certs

# OpenFGA disabled in tests — ScopeContext uses dev fallback
erp:
  openfga:
    enabled: false
    dev-scope:
      company-ids: 1
      project-ids: 1,2
      warehouse-ids: 1
      super-admin: true
