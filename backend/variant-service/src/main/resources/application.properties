# Varsayılan olarak 'local' profilini aktif et.
spring.profiles.active=local

# --- ORTAK AYARLAR ---
spring.application.name=variant-service
server.port=8091

# Vault (prod/test profilleri application-prod.yml & application-test.yml ile yüklenir)

# JWT Ayarları
# RS256/JWKS doğrulaması (kullanıcı JWT)
security.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
security.jwt.issuer=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
security.jwt.audience=${SECURITY_JWT_AUDIENCE:variant-service}

# Veri tabanı ayarları (Vault)
spring.datasource.url=${vault.db.variant-service.url}
spring.datasource.username=${vault.db.variant-service.user}
spring.datasource.password=${vault.db.variant-service.password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${VARIANT_DB_SCHEMA:variant_service}
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=${VARIANT_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.table=variant_flyway_history
spring.flyway.default-schema=${VARIANT_DB_SCHEMA:variant_service}
spring.flyway.schemas=${VARIANT_DB_SCHEMA:variant_service}

# Log seviyesini ayarla
logging.level.com.example.variant.service=DEBUG
logging.level.com.example.variant.controller=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.example.variant.security=DEBUG

# Actuator & Health Check Ayarları
management.endpoints.web.exposure.include=health,info

# Eureka Client Ayarları
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health
eureka.instance.prefer-ip-address=true
