# src/main/resources/application-local.properties

# Yerel ortam varsayılanları
spring.config.import=
spring.cloud.vault.enabled=false
spring.cloud.vault.fail-fast=false
spring.cloud.vault.kv.enabled=false

spring.datasource.url=${VARIANT_LOCAL_DB_URL:jdbc:postgresql://localhost:5432/users}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
spring.flyway.table=variant_flyway_history
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
spring.security.oauth2.resourceserver.jwt.enabled=false
security.service-auth.jwk-set-uri=${SERVICE_AUTH_JWK_SET_URI:http://127.0.0.1:8088/oauth2/jwks}
security.service-auth.issuer=${SERVICE_AUTH_ISSUER:auth-service}
permission.service.base-url=${PERMISSION_SERVICE_BASE_URL:http://127.0.0.1:8084}

# OpenFGA — disabled in local dev
erp.openfga.enabled=false
erp.openfga.dev-scope.company-ids=1
erp.openfga.dev-scope.project-ids=1,2
erp.openfga.dev-scope.warehouse-ids=1
erp.openfga.dev-scope.super-admin=true
