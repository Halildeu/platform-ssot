spring.profiles.active=test
spring.config.import=
spring.cloud.vault.enabled=false

spring.datasource.url=jdbc:h2:mem:permtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

eureka.client.enabled=false

# Disable real JWT fetch in tests
auth.security.mock=true
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/serban/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/serban
