spring.profiles.active=test
spring.config.import=
spring.cloud.vault.enabled=false
spring.main.banner-mode=off
spring.jpa.open-in-view=false
spring.cloud.service-registry.auto-registration.enabled=false

spring.datasource.url=jdbc:h2:mem:permtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

eureka.client.enabled=false
spring.cloud.discovery.enabled=false
management.endpoints.access.default=none
management.prometheus.metrics.export.enabled=false
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.netflix.discovery=OFF
logging.level.org.springframework.cloud.netflix.eureka=OFF
logging.level.com.example=ERROR

# Flyway disabled in tests; Hibernate ddl-auto=create-drop manages schema
spring.flyway.enabled=false

# Disable real JWT fetch in tests
auth.security.mock=true
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/serban/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/serban
