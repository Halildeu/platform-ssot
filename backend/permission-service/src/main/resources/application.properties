spring.profiles.active=local

# Virtual Threads (Loom) — Java 21
spring.threads.virtual.enabled=true

spring.application.name=permission-service
server.port=${PERMISSION_SERVICE_PORT:8084}

# Vault (prod/test profilleri application-prod.yml & application-test.yml ile yüklenir)

spring.datasource.url=${vault.db.permission-service.url}
spring.datasource.username=${vault.db.permission-service.user}
spring.datasource.password=${vault.db.permission-service.password}
spring.datasource.driver-class-name=org.postgresql.Driver
security.legacy-api-key.enabled=${SECURITY_LEGACY_API_KEY_ENABLED:false}
security.internal-api-key.enabled=${SECURITY_INTERNAL_API_KEY_ENABLED:}
security.internal-api-key.value=${PERMISSION_SERVICE_INTERNAL_API_KEY:}

security.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
security.jwt.user-jwk-set-uri=${SECURITY_JWT_USER_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
security.jwt.issuer=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
security.jwt.audience=${SECURITY_JWT_AUDIENCE:permission-service}
security.jwt.allowed-client-ids=${SECURITY_AUTH_ALLOWED_CLIENT_IDS:frontend,admin-cli,serban-web}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SECURITY_JWT_USER_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
spring.security.oauth2.resourceserver.jwt.audiences=${SECURITY_JWT_AUDIENCE:permission-service}

spring.jpa.hibernate.ddl-auto=${PERMISSION_DB_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${PERMISSION_DB_SCHEMA:public}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=${PERMISSION_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.table=permission_flyway_history
spring.flyway.default-schema=${PERMISSION_DB_SCHEMA:public}
spring.flyway.schemas=${PERMISSION_DB_SCHEMA:public}

audit.live-stream.enabled=${AUDIT_LIVE_STREAM_ENABLED:true}
permission.bootstrap.default-admin-assignments.enabled=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_ENABLED:false}
permission.bootstrap.default-admin-assignments.admin-emails=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_EMAILS:admin@example.com,admin1@example.com}
permission.bootstrap.default-admin-assignments.max-attempts=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_MAX_ATTEMPTS:10}
permission.bootstrap.default-admin-assignments.retry-delay-ms=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_RETRY_DELAY_MS:2000}
permission.bootstrap.default-admin-assignments.user-table=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE:users}

# OpenFGA (Zanzibar) — tuple sync on role mutations
erp.openfga.enabled=${ERP_OPENFGA_ENABLED:false}
erp.openfga.api-url=${ERP_OPENFGA_API_URL:http://localhost:4000}
erp.openfga.store-id=${ERP_OPENFGA_STORE_ID:}
erp.openfga.model-id=${ERP_OPENFGA_MODEL_ID:}
erp.openfga.dev-scope.company-ids=1
erp.openfga.dev-scope.project-ids=1,2
erp.openfga.dev-scope.warehouse-ids=1
erp.openfga.dev-scope.super-admin=true

management.endpoints.web.exposure.include=health,info

logging.level.com.example.permission.security=INFO

eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health
