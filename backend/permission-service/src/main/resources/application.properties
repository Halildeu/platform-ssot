spring.profiles.active=local

spring.application.name=permission-service
server.port=${PERMISSION_SERVICE_PORT:8084}

# Vault (prod/test profilleri application-prod.yml & application-test.yml ile yüklenir)

spring.datasource.url=${vault.db.permission-service.url}
spring.datasource.username=${vault.db.permission-service.user}
spring.datasource.password=${vault.db.permission-service.password}
spring.datasource.driver-class-name=org.postgresql.Driver
security.legacy-api-key.enabled=${SECURITY_LEGACY_API_KEY_ENABLED:false}

security.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
security.jwt.user-jwk-set-uri=${SECURITY_JWT_USER_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
security.jwt.issuer=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
security.jwt.audience=${SECURITY_JWT_AUDIENCE:permission-service}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SECURITY_JWT_USER_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
spring.security.oauth2.resourceserver.jwt.audiences=${SECURITY_JWT_AUDIENCE:permission-service}

spring.jpa.hibernate.ddl-auto=${PERMISSION_DB_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=permission_flyway_history

audit.live-stream.enabled=${AUDIT_LIVE_STREAM_ENABLED:true}

management.endpoints.web.exposure.include=health,info

logging.level.com.example.permission.security=INFO

eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health
