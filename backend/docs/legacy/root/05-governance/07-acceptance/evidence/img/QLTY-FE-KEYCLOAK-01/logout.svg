<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#1b1b1f"/>
  <rect x="40" y="40" width="560" height="280" rx="24" fill="#212733" stroke="#ff8a80" stroke-width="3"/>
  <text x="60" y="90" font-family="'SFMono-Regular', 'Consolas', sans-serif" font-size="20" fill="#ff8a80">Shell Logout Yayını</text>
  <text x="60" y="140" font-family="'Inter', sans-serif" font-size="18" fill="#ffeae6">BroadcastChannel: shell-auth</text>
  <text x="60" y="170" font-family="'Inter', sans-serif" font-size="18" fill="#ffeae6">storage fallback key: serban.shell.authState</text>
  <text x="60" y="200" font-family="'Inter', sans-serif" font-size="18" fill="#ffeae6">Message: { event: "logout", reason: "user_action" }</text>
  <text x="60" y="230" font-family="'Inter', sans-serif" font-size="18" fill="#ffeae6">Sonuç: Tüm sekmeler aynı anda &quot;Oturumunuz kapatıldı&quot; banner’ı gösterir.</text>
  <text x="60" y="270" font-family="'Inter', sans-serif" font-size="16" fill="#ffc4bc">Kanıt: Login sekmesi kapanınca /login?redirect=/suggestions yeniden yüklendi.</text>
</svg>
