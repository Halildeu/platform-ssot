spring:
  application:
    name: core-data-service-test
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:mem:coredata;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: PUBLIC
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: core_data_flyway_history
    default-schema: PUBLIC
    schemas: PUBLIC
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/fake

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: true

management:
  endpoints:
    access:
      default: none
  prometheus:
    metrics:
      export:
        enabled: false

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    org.hibernate: ERROR
    com.netflix.discovery: OFF
    org.springframework.cloud.netflix.eureka: OFF
    com.example: ERROR

server:
  port: 0

# OpenFGA disabled in tests — ScopeContext uses dev fallback
erp:
  openfga:
    enabled: false
    dev-scope:
      company-ids: 1
      project-ids: 1,2
      warehouse-ids: 1
      super-admin: true
