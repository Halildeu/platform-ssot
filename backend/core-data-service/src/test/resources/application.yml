spring:
  application:
    name: core-data-service-test
  datasource:
    url: jdbc:h2:mem:coredata;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/fake

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: true

server:
  port: 0
