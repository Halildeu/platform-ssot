spring:
  application:
    name: core-data-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${CORE_DATA_DB_URL:jdbc:postgresql://localhost:5432/coredata}}
    username: ${SPRING_DATASOURCE_USERNAME:${CORE_DATA_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${CORE_DATA_DB_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${CORE_DATA_DB_SCHEMA:public}
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: core_data_flyway_history
    default-schema: ${CORE_DATA_DB_SCHEMA:public}
    schemas: ${CORE_DATA_DB_SCHEMA:public}
    locations: ${CORE_DATA_FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: 0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
