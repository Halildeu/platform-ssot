apiVersion: 1
groups:
  - orgId: 1
    name: Service Health
    folder: Alerts
    interval: 1m
    rules:
      - uid: service-down
        title: Service Down
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up == 0
              intervalMs: 1000
              maxDataPoints: 43200
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
      - uid: high-latency
        title: High Latency (>1s)
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 1
              intervalMs: 1000
              maxDataPoints: 43200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency > 1s for {{ $labels.uri }}"
      - uid: high-error-rate
        title: High Error Rate (>5%)
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
              intervalMs: 1000
              maxDataPoints: 43200
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5% for {{ $labels.uri }}"
