# src/main/resources/application-local.properties

# YEREL ORTAM AYARLARI
spring.datasource.url=jdbc:postgresql://localhost:5432/users
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
spring.flyway.table=user_flyway_history
spring.config.import=
spring.cloud.vault.enabled=false
spring.cloud.vault.fail-fast=false
spring.cloud.vault.kv.enabled=false

spring.datasource.url=${USER_LOCAL_DB_URL:jdbc:postgresql://localhost:5432/users}
spring.datasource.username=${POSTGRES_USER:dev_user}
spring.datasource.password=${POSTGRES_PASSWORD:dev_password}
spring.jpa.hibernate.ddl-auto=update

eureka.instance.prefer-ip-address=false
eureka.instance.hostname=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
spring.security.oauth2.resourceserver.jwt.enabled=true
# Browser oturumu Keycloak access token'i tasir; bu nedenle birincil decoder Keycloak issuer/JWKS'ini kullanir.
# Auth-service fallback decoder ise servis-token ve legacy local akislari icin ayrica tanimlidir.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
security.service-auth.jwk-set-uri=${SERVICE_AUTH_JWK_SET_URI:http://127.0.0.1:8088/oauth2/jwks}
security.service-auth.issuer=${SERVICE_AUTH_ISSUER:auth-service}
security.service-auth.expected-audience=${SERVICE_AUTH_EXPECTED_AUDIENCE:user-service,frontend,account,serban-web}
permission.audit-mirror.base-url=${PERMISSION_AUDIT_MIRROR_BASE_URL:http://127.0.0.1:8084}
permission.audit-mirror.internal-api-key=${PERMISSION_SERVICE_INTERNAL_API_KEY:dev-local-audit-mirror-key}

# OpenFGA — disabled in local dev (uses YAML scope fallback)
erp.openfga.enabled=false
erp.openfga.api-url=http://localhost:4000
erp.openfga.dev-scope.company-ids=1
erp.openfga.dev-scope.project-ids=1,2
erp.openfga.dev-scope.warehouse-ids=1
erp.openfga.dev-scope.super-admin=true
