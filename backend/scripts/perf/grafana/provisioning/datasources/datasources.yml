apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    isDefault: false
    editable: true
    uid: prometheus
    url: http://prometheus:9090
    jsonData:
      timeInterval: 10s

  - name: Loki
    type: loki
    access: proxy
    isDefault: false
    editable: true
    uid: loki
    url: http://loki:3100
    jsonData:
      maxLines: 1000

