apiVersion: 1

groups:
  - orgId: 1
    name: reports-guard
    folder: Operations / Reports Guard
    interval: 1m
    rules:
      - uid: reports-unauthorized-warning
        title: Reports unauthorized ratio (warning)
        condition: B
        data:
          - refId: A
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: |
                sum(rate(route_guard_hits_total{path=~"/admin/reports/.*",result="unauthorized"}[5m]))
                /
                clamp_min(sum(rate(route_guard_hits_total{path=~"/admin/reports/.*"}[5m])), 0.001)
              interval: ""
              intervalMs: 1000
              legendFormat: unauthorized ratio
              maxDataPoints: 43200
              refId: A
              range: true
              instant: false
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.05
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                      - 5m
                      - now
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 5 dk ortalamada unauthorized oranı %5 üzerine çıktı.
        labels:
          severity: warning
          component: reports-guard
        isPaused: false

      - uid: reports-unauthorized-critical
        title: Reports unauthorized ratio (critical)
        condition: B
        data:
          - refId: A
            queryType: timeSeriesQuery
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: |
                sum(rate(route_guard_hits_total{path=~"/admin/reports/.*",result="unauthorized"}[5m]))
                /
                clamp_min(sum(rate(route_guard_hits_total{path=~"/admin/reports/.*"}[5m])), 0.001)
              interval: ""
              intervalMs: 1000
              legendFormat: unauthorized ratio
              maxDataPoints: 43200
              refId: A
              range: true
              instant: false
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.15
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                      - 5m
                      - now
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 5 dk ortalamada unauthorized oranı %15 üzerine çıktı.
        labels:
          severity: critical
          component: reports-guard
        isPaused: false

