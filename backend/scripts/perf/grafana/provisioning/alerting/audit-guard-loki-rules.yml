apiVersion: 1

groups:
  - orgId: 1
    name: audit-guard-loki
    folder: Operations / Audit Guard
    interval: 1m
    rules:
      - uid: audit-unauthorized-warning-loki
        title: Audit unauthorized ratio (warning, Loki)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: |
                (
                  sum(rate({app="api-gateway"} |= "/admin/audit/" |= " 401 " [5m]))
                ) / clamp_min(
                  sum(rate({app="api-gateway"} |= "/admin/audit/" [5m])), 0.001
                )
              refId: A
              queryType: range
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator: { type: gt, params: [0.05] }
                  operator: { type: and }
                  query: { params: [A, 5m, now] }
                  reducer: { type: avg, params: [] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations: { summary: "Loki oranı %5 üzerinde (5 dk)" }
        labels: { severity: warning, component: audit-guard }
        isPaused: false

      - uid: audit-unauthorized-critical-loki
        title: Audit unauthorized ratio (critical, Loki)
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              datasource: { type: loki, uid: loki }
              expr: |
                (
                  sum(rate({app="api-gateway"} |= "/admin/audit/" |= " 401 " [5m]))
                ) / clamp_min(
                  sum(rate({app="api-gateway"} |= "/admin/audit/" [5m])), 0.001
                )
              refId: A
              queryType: range
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator: { type: gt, params: [0.15] }
                  operator: { type: and }
                  query: { params: [A, 5m, now] }
                  reducer: { type: avg, params: [] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations: { summary: "Loki oranı %15 üzerinde (5 dk)" }
        labels: { severity: critical, component: audit-guard }
        isPaused: false

